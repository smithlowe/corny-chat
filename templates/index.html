<!DOCTYPE html>
<html>
<head>
    <title>Corny-Comm Medical</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        #chat-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; background: #eee; display: flex; flex-direction: column; }
        .msg { margin: 5px; padding: 8px 12px; border-radius: 10px; max-width: 70%; }
        .my { align-self: flex-end; background: #007bff; color: white; }
        .other { align-self: flex-start; background: #ddd; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>🏥 Corny-Comm</h2>
        <input type="text" id="username" placeholder="Name">
        <select id="role" onchange="document.getElementById('accessCode').style.display=(this.value=='Doctor'?'block':'none')">
            <option value="Patient">Patient</option>
            <option value="Doctor">Doctor</option>
        </select>
        <input type="password" id="accessCode" placeholder="Code" style="display:none;">
        <select id="hospital">
            <option value="Mulago">Mulago</option>
            <option value="Nakasero">Nakasero</option>
            <option value="Mukono">Mukono</option>
        </select>
        <button id="join-btn" onclick="join()">JOIN LOBBY</button>
        <button id="logout-btn" onclick="logout()" style="display:none; background:red;">LOGOUT</button>
        <div id="doc-list" style="display:none; margin-top:15px; border-top:1px solid #ccc;">
            <p><small>Available Doctors:</small></p>
            <div id="list-area"></div>
        </div>
    </div>

    <div id="chat-container">
        <div style="background:#007bff; color:white; padding:10px; display:flex; justify-content:space-between;">
            <span id="chat-with">Chat</span>
            <button onclick="end()" style="width:auto; background:red;">END</button>
        </div>
        <div id="messages"></div>
        <div style="padding:10px; display:flex;">
            <input type="text" id="m-input" placeholder="Message...">
            <button onclick="send()" style="width:auto;">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myN, myH, myD, myR;

        window.onload = () => {
            myN = localStorage.getItem('n'); myH = localStorage.getItem('h');
            myR = localStorage.getItem('r'); myD = localStorage.getItem('d');
            if(myN && myH) {
                uiLobby();
                socket.emit('join', {name: myN, hospital: myH, role: myR, doctor_name: myD});
                if(myD && myD !== "null") showChat(myD);
            }
        };

        async function join() {
            myN = document.getElementById('username').value;
            myH = document.getElementById('hospital').value;
            myR = document.getElementById('role').value;
            if(myR === 'Doctor') {
                const res = await fetch('/verify-code', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({hospital:myH, code:document.getElementById('accessCode').value})});
                if(!(await res.json()).success) return alert("Wrong Code");
                myD = myN;
            }
            localStorage.setItem('n', myN); localStorage.setItem('h', myH); localStorage.setItem('r', myR); localStorage.setItem('d', myD);
            uiLobby();
            socket.emit('join', {name: myN, hospital: myH, role: myR, doctor_name: myD});
        }

        function uiLobby() {
            document.getElementById('join-btn').disabled = true;
            document.getElementById('join-btn').innerText = "In Lobby";
            if(myR === 'Doctor') document.getElementById('logout-btn').style.display = 'block';
            if(myR === 'Patient') document.getElementById('doc-list').style.display = 'block';
        }

        function logout() {
            socket.emit('doctor_logout', {hospital: myH, name: myN});
            localStorage.clear(); location.reload();
        }

        socket.on('update_doctor_list', (docs) => {
            const area = document.getElementById('list-area');
            area.innerHTML = docs.length ? "" : "No doctors...";
            docs.forEach(d => {
                const b = document.createElement('button');
                b.innerText = "Consult " + d;
                b.onclick = () => {
                    myD = d; localStorage.setItem('d', d);
                    socket.emit('accept_patient', {doctor: d, hospital: myH, patient: myN}); // Direct trigger for speed
                };
                area.appendChild(b);
            });
        });

        socket.on('start_session', (data) => {
            if(myR === 'Doctor' && myN === data.doctor) showChat(data.patient);
            else if(myR === 'Patient' && myN === data.patient) { myD = data.doctor; localStorage.setItem('d', data.doctor); showChat(data.doctor); }
        });

        function showChat(t) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-with').innerText = "With: " + t;
        }

        function send() {
            const i = document.getElementById('m-input');
            if(!i.value) return;
            socket.emit('send_message', {user: myN, message: i.value, hospital: myH, doctorName: myD});
            i.value = "";
        }

        socket.on('receive_message', (data) => {
            if(data.doctorName === myD) {
                const div = document.createElement('div');
                div.className = `msg ${data.user === myN ? 'my' : 'other'}`;
                div.innerHTML = `<b>${data.user}:</b> ${data.message}`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = 9999;
            }
        });

        socket.on('load_history', (msgs) => {
            document.getElementById('messages').innerHTML = "";
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.sender === myN ? 'my' : 'other'}`;
                div.innerHTML = `<b>${m.sender}:</b> ${m.content}`;
                document.getElementById('messages').appendChild(div);
            });
        });

        function end() {
            socket.emit('end_session_global', {hospital: myH, doctor: myD});
        }

        socket.on('force_exit_session', (data) => {
            if(myD === data.doctor) {
                localStorage.removeItem('d'); myD = null;
                document.getElementById('chat-container').style.display = 'none';
                document.getElementById('login-container').style.display = 'block';
                document.getElementById('messages').innerHTML = "";
            }
        });
    </script>
</body>
</html>
