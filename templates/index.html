<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny-Comm Medical Portal</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        #chat-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; flex-direction: column; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .btn-red { background: #dc3545; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; word-wrap: break-word; font-size: 15px; }
        .my { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
        .chat-header { background: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; background: white; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2 style="color: #007bff; margin-top: 0;">🏥 Corny-Comm</h2>
        <input type="text" id="username" placeholder="Your Full Name">
        <select id="role" onchange="document.getElementById('accessCode').style.display=(this.value=='Doctor'?'block':'none')">
            <option value="Patient">I am a Patient</option>
            <option value="Doctor">I am a Doctor</option>
        </select>
        <input type="password" id="accessCode" placeholder="Doctor Access Code" style="display:none;">
        <select id="hospital">
            <option value="Mulago">Mulago Hospital</option>
            <option value="Nakasero">Nakasero Hospital</option>
            <option value="Mukono">Mukono Clinic</option>
        </select>
        <button onclick="join()">JOIN LOBBY</button>
    </div>

    <div id="chat-container">
        <div class="chat-header">
            <span id="chat-status">🏥 Medical Room</span>
            <button onclick="logout()" class="btn-red" style="width:auto; margin:0;">LEAVE</button>
        </div>
        <div id="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="m-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="width:auto; margin:0;">Send</button>
        </div>
    </div>

    <script>
        // FIX: Force WebSocket transport for Render compatibility
        const socket = io({
            transports: ["websocket"],
            upgrade: false
        });

        // Check for existing session
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('n')) {
                showChatUI();
                rejoinRoom();
            }
        });

        function showChatUI() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
        }

        function rejoinRoom() {
            socket.emit('join', { 
                name: localStorage.getItem('n'), 
                hospital: localStorage.getItem('h'), 
                role: localStorage.getItem('r') 
            });
        }

        async function join() {
            const user = document.getElementById('username').value.trim();
            const role = document.getElementById('role').value;
            const hosp = document.getElementById('hospital').value;
            const code = document.getElementById('accessCode').value;

            if (!user) return alert("Please enter your name");

            if (role === 'Doctor') {
                const res = await fetch('/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hospital: hosp, code: code, name: user })
                });
                const data = await res.json();
                if (!data.success) return alert("Invalid Code!");
            }

            localStorage.setItem('n', user);
            localStorage.setItem('h', hosp);
            localStorage.setItem('r', role);

            showChatUI();
            rejoinRoom();
        }

        function send() {
            const input = document.getElementById('m-input');
            const message = input.value.trim();
            const user = localStorage.getItem('n');
            const hosp = localStorage.getItem('h');

            if (message) {
                // FIX: Match these keys with your app.py handle_message logic
                socket.emit('send_message', {
                    user: user,
                    message: message,
                    hospital: hosp,
                    room_id: hosp 
                });
                input.value = '';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // LISTENERS
        socket.on('receive_message', (data) => {
            const msgDiv = document.getElementById('messages');
            const div = document.createElement('div');
            const isMe = data.user === localStorage.getItem('n');
            div.className = isMe ? 'msg my' : 'msg other';
            div.innerHTML = `<strong>${data.user}</strong><br>${data.message}`;
            msgDiv.appendChild(div);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        socket.on('status', (data) => {
            const msgDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.style.cssText = "text-align:center; font-size:11px; color:#888; margin:5px;";
            div.textContent = data.msg;
            msgDiv.appendChild(div);
        });
    </script>
</body>
</html>
