<!DOCTYPE html>
<html>
<head>
    <title>Global Social</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background: #f0f2f5; text-align: center; font-family: sans-serif; padding: 20px;">

    <h1>🌍 Global Social</h1>

    <div id="counter" style="background: #28a745; color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 20px;">
        Online: <span id="user-count">0</span>
    </div>

    <div id="login-area" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 300px; margin: 0 auto;">
        <input type="text" id="username" placeholder="Choose a nickname" style="width: 80%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd;">
        <button onclick="joinChat()" style="width: 88%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Join World</button>
    </div>

    <div id="chat-area" style="display:none; max-width: 500px; margin: 0 auto;">
        <div id="messages" style="height: 300px; background: white; border: 1px solid #ddd; overflow-y: scroll; padding: 10px; text-align: left; margin-bottom: 10px; border-radius: 5px;"></div>
        <input type="text" id="msg-input" placeholder="Type a message..." style="width: 70%; padding: 10px;">
        <button onclick="sendMsg()" style="padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px;">Send</button>
    </div>

    <script>
        var socket = io();
        var myName = "";

        socket.on('user_count', function(data) {
            document.getElementById('user-count').innerText = data.count;
        });

        function joinChat() {
            var input = document.getElementById('username');
            if (input.value.trim() !== "") {
                myName = input.value;
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('chat-area').style.display = 'block';
            } else {
                alert("Please enter a name!");
            }
        }

        function sendMsg() {
            var msgInput = document.getElementById('msg-input');
            if (msgInput.value.trim() !== "") {
                socket.emit('message', {user: myName, msg: msgInput.value});
                msgInput.value = "";
            }
        }

        socket.on('message', function(data) {
            var div = document.createElement('div');
            div.style.marginBottom = "8px";
            div.innerHTML = `<strong style="color: #007bff;">${data.user}:</strong> ${data.msg}`;
            document.getElementById('messages').appendChild(div);
            // Auto-scroll to bottom
            var msgDiv = document.getElementById('messages');
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    </script>
</body>
</html>
