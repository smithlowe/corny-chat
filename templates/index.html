<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #e5ddd5; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 500px; height: 100%; background: #fff; display: flex; flex-direction: column; position: relative;}
        
        header { background: #075e54; color: white; padding: 12px 15px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; background: #f0f2f5; }

        .msg-row { margin-bottom: 12px; display: flex; align-items: flex-end; gap: 8px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        
        .is-me { flex-direction: row-reverse; }
        .pfp { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; background: #eee; }
        .bubble { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .mine { background: #dcf8c6; border-top-right-radius: 2px; }
        .theirs { background: #fff; border-top-left-radius: 2px; }

        .input-bar { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        #msg-in { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { border-radius: 50%; background: #075e54; color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-send { width: 45px; height: 45px; font-size: 20px; }
        .btn-pfp { width: 32px; height: 32px; font-size: 14px; background: rgba(255,255,255,0.2); }

        #login { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pfp-pick { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #075e54; margin-bottom: 20px; cursor: pointer; object-fit: cover; background: #f9f9f9; }
    </style>
</head>
<body>
<div id="app">
    <div id="login">
        <p style="margin-bottom: 10px; color: #666;">Tap to choose photo</p>
        <img id="pre" class="pfp-pick" src="https://api.dicebear.com/7.x/bottts/svg?seed=new" onclick="document.getElementById('fin').click()">
        <input type="file" id="fin" accept="image/*" style="display:none" onchange="imgL(this)">
        <input type="text" id="nin" placeholder="Your Name" style="width:260px; padding:15px; border-radius:30px; border:1px solid #ddd; text-align:center; margin-bottom:20px; font-size: 16px;">
        <button onclick="go()" class="btn" style="width:180px; height:50px; border-radius:30px; font-weight:bold;">ENTER CHAT</button>
    </div>

    <header>
        <strong>Global Social</strong>
        <button class="btn btn-pfp" onclick="document.getElementById('fin').click()" title="Change Profile Picture">📷</button>
    </header>

    <div id="chat"></div>

    <div class="input-bar">
        <input type="text" id="msg-in" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
        <button class="btn btn-send" onclick="send()">➤</button>
    </div>
</div>

<script>
    const socket = io();
    let myN = localStorage.getItem('cn') || "";
    let myP = localStorage.getItem('cp') || "";

    // Show login if no name saved
    if (myN) {
        document.getElementById('login').style.display = 'none';
        if(myP) document.getElementById('pre').src = myP;
    }

    // Handle Gallery Upload
    function imgL(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64Image = e.target.result;
                document.getElementById('pre').src = base64Image;
                myP = base64Image;
                localStorage.setItem('cp', base64Image); // Save to phone memory
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function go() {
        const n = document.getElementById('nin').value.trim();
        if (n) { 
            myN = n; 
            localStorage.setItem('cn', n); 
            document.getElementById('login').style.display = 'none'; 
        }
    }

    function send() {
        const input = document.getElementById('msg-in');
        if (input.value.trim()) { 
            socket.emit('message', {
                username: myN, 
                message: input.value, 
                profile_pic: myP
            }); 
            input.value = ''; 
        }
    }

    socket.on('message', d => {
        const chat = document.getElementById('chat');
        const isMe = d.username === myN;
        
        // Use uploaded pic, or a default bot avatar if empty
        const picSource = d.profile_pic || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.username}`;
        
        const html = `
            <div class="msg-row ${isMe ? 'is-me' : ''}">
                <img src="${picSource}" class="pfp">
                <div class="bubble ${isMe ? 'mine' : 'theirs'}">
                    ${!isMe ? `<span style="font-size:11px; font-weight:bold; color:#075e54; display:block; margin-bottom:3px;">${d.username}</span>` : ''}
                    ${d.message}
                </div>
            </div>`;
            
        chat.insertAdjacentHTML('beforeend', html);
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
