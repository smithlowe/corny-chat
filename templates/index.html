<body>
    <div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#ffd700; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;">
        <h1>Welcome to Corny Chat 🌽</h1>
        <input type="text" id="username-input" placeholder="Enter your name..." style="padding:15px; border-radius:10px; border:none; width:250px;">
        <button onclick="joinChat()" style="margin-top:15px; background:white; padding:10px 30px;">Join Chat</button>
    </div>

    <div id="main-chat" style="display:none;">
        <h1>Corny Chat 🌽</h1>
        <div style="font-weight: bold;">Online: <span id="user-count">0</span> Users</div>
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendText()">Send 🌽</button>
            <button id="record-btn">🎤 Record</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";

        function joinChat() {
            const input = document.getElementById('username-input');
            if (input.value.trim()) {
                myName = input.value.trim();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-chat').style.display = 'block';
                // Tell the server who joined
                socket.emit('user_joined', { name: myName });
            }
        }

        // Receive Messages
        socket.on('render_msg', (data) => {
            const div = document.createElement('div');
            div.className = 'message';
            const sender = data.user === myName ? "Me" : data.user;
            
            if (data.type === 'text') {
                div.innerHTML = `<strong>${sender}:</strong> ${data.content}`;
            } else {
                div.innerHTML = `<strong>${sender}:</strong> <audio src="${data.content}" controls></audio>`;
            }
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        // Update Counter
        socket.on('user_count', (data) => {
            document.getElementById('user-count').innerText = data.count;
        });

        function sendText() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                socket.emit('message', { content: input.value, user: myName });
                input.value = '';
            }
        }

        // Voice Recording (Updated to include name)
        const recordBtn = document.getElementById('record-btn');
        let mediaRecorder;
        let chunks = [];
        recordBtn.onmousedown = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => socket.emit('voice_note', { audio: reader.result, user: myName });
            };
            mediaRecorder.start();
            recordBtn.innerText = "Recording...";
        };
        recordBtn.onmouseup = () => { if(mediaRecorder) { mediaRecorder.stop(); recordBtn.innerText = "🎤 Record"; } };
    </script>
</body>
