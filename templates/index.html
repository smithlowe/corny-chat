<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #d1d7db; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app-container { width: 100%; max-width: 450px; height: 100%; background: #fff; display: flex; flex-direction: column; position: relative; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); overflow-y: auto; padding: 15px; }
        .msg-container { margin-bottom: 10px; display: flex; flex-direction: column; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine { align-self: flex-end; background: #dcf8c6; }
        .others { align-self: flex-start; background: #fff; }
        .user-tag { font-size: 11px; font-weight: bold; color: #075e54; display: block; }
        #typing-box { font-size: 12px; color: #555; padding: 5px 15px; background: #f0f0f0; min-height: 22px; }
        .input-bar { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: none; outline: none; }
        button { background: #075e54; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        #overlay { position: absolute; inset: 0; background: white; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
<div id="app-container">
    <div id="overlay">
        <h1>🌍 Global Social</h1>
        <input type="text" id="name-in" placeholder="Nickname..." style="width: 80%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
        <button onclick="start()" style="width: 80%; border-radius: 5px;">Join</button>
    </div>
    <header><span>Global Social</span><span id="count">Online: 0</span></header>
    <div id="chat-window"></div>
    <div id="typing-box"></div>
    <div class="input-bar">
        <input type="text" id="msg-in" placeholder="Message..." oninput="isTyping()">
        <button onclick="send()">></button>
    </div>
</div>
<script>
    const socket = io();
    let myName = localStorage.getItem('chat_name') || "";
    if (myName) document.getElementById('overlay').style.display = 'none';

    function start() {
        const val = document.getElementById('name-in').value;
        if (val) { myName = val; localStorage.setItem('chat_name', val); document.getElementById('overlay').style.display = 'none'; }
    }
    function send() {
        const el = document.getElementById('msg-in');
        if (el.value.trim()) { socket.emit('message', {username: myName, message: el.value}); el.value = ''; socket.emit('typing', {username: myName, status: false}); }
    }
    function isTyping() {
        socket.emit('typing', {username: myName, status: true});
        clearTimeout(window.t);
        window.t = setTimeout(() => socket.emit('typing', {username: myName, status: false}), 2000);
    }
    socket.on('user_count', d => document.getElementById('count').innerText = "Online: " + d.count);
    socket.on('message', d => {
        const win = document.getElementById('chat-window');
        const isMe = d.username === myName;
        win.innerHTML += `<div class="msg-container"><div class="bubble ${isMe ? 'mine' : 'others'}">${!isMe ? `<span class="user-tag">${d.username}</span>` : ''}${d.message}</div></div>`;
        win.scrollTop = win.scrollHeight;
    });
    socket.on('display_typing', d => document.getElementById('typing-box').innerText = d.status ? d.username + " is typing..." : "");
</script>
</body>
</html>
