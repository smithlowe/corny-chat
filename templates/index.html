<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny-Comm Medical Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        #timer-display {
    position: absolute;
    top: -45px; /* Sits above the mic */
    left: 50%;
    transform: translateX(-50%);
    background: #dc3545;
    color: white;
    padding: 5px 10px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 14px;
    display: none; /* Hidden until recording starts */
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    z-index: 100;
}
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        #chat-container { display: none; flex-direction: column; height: 100vh; background: white; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; margin-top: 60px; margin-bottom: 110px; display: flex; flex-direction: column; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; margin-bottom: 10px; font-size: 15px; }
        .my { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 2px; }
        .chat-media-style {
    display: block;
    margin-top: 5px;
    border: 1px solid #ddd;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
        .chat-header { background: #007bff; color: white; padding: 15px; position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; z-index: 10; box-sizing: border-box; }
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #f8f9fa; border-top: 1px solid #ddd; display: grid; grid-template-columns: 50px 1fr 40px 70px; gap: 8px; align-items: center; box-sizing: border-box; }
        #login-overlay { position: fixed; inset: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 20; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 2000; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: #007bff; margin-bottom: 20px;">🏥 Corny-Comm</h2>
        
        <input type="text" id="username" placeholder="Your Full Name" style="width:100%; padding: 10px; margin-bottom:10px; border: 1px solid #ccc; border-radius: 5px;">
        
        <select id="hospSelect" style="width:100%; padding: 10px; margin-bottom:15px; border: 1px solid #ccc; border-radius: 5px;">
            <option value="Mukono">Mukono General</option>
            <option value="Wakiso">Wakiso Health IV</option>
            <option value="Mulago">Mulago National</option>
        </select>

        <p style="font-size: 12px; color: gray; margin-bottom: 5px;">FOR PATIENTS ONLY</p>
        <button onclick="startPatientFlow()" style="width: 100%; padding: 12px; background: orange; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px;">
            Pay & Request Consultation (5k)
        </button>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <p style="font-size: 12px; color: gray; margin-bottom: 5px;">FOR DOCTORS ONLY</p>
        <input type="password" id="docCode" placeholder="Enter Doctor Access Code" style="width:100%; padding: 10px; margin-bottom:10px; border: 1px solid #ccc; border-radius: 5px;">
        
        <button onclick="startDoctorFlow()" style="width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
            Enter Doctor Lounge (Free)
        </button>
    </div>
</div>
<div id="doctor-dashboard" style="display:none; padding: 20px; font-family: sans-serif;">
    <div style="background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #28a745; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2 style="color: #28a745; margin-top: 0;">👨‍⚕️ Hospital Waiting Room</h2>
        <p>Welcome, <span id="display-doc-name" style="font-weight: bold;"></span></p>
        <p style="color: #666; font-size: 14px;">Incoming patient requests for your hospital will appear below:</p>
        <hr>
        
        <div id="waiting-list" style="min-height: 100px;">
            <p id="no-patients" style="color: #999; text-align: center; padding: 20px;">No patients waiting at the moment...</p>
        </div>
    </div>
</div>
    <div id="chat-container" style="display: none; height: 100vh; flex-direction: column;">
        <div class="chat-header" style="background: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <span>🟢 Live Session</span>
            <button onclick="logout()" style="background:#dc3545; color: white; border: none; padding:5px 10px; border-radius: 5px;">LEAVE</button>
        </div>

        <div id="messages" style="flex: 1; overflow-y: auto; padding: 15px; background: #fff;"></div>

        <div class="input-area" style="display: flex; flex-direction: column; background: #f8f9fa; border-top: 1px solid #ccc; position: relative; padding: 10px;">
            
            <div id="timer-display" style="display: none; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: rgba(220, 53, 69, 0.9); color: white; padding: 2px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; z-index: 100;">0:00</div>

            <div id="upload-container" style="display: none; width: 100%; padding: 8px; background: #f1f1f1; border-radius: 5px; margin-bottom: 5px;">
                <div style="background: #ccc; border-radius: 5px; height: 8px; width: 100%; overflow: hidden;">
                    <div id="upload-bar" style="background: #28a745; width: 0%; height: 100%; transition: width 0.3s;"></div>
                </div>
                <small id="upload-text" style="font-size: 11px;">Uploading: 0%</small>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <button id="mic-btn" style="background: #dc3545; width: 42px; height: 42px; border-radius: 50%; color: white; border: none; cursor: pointer; touch-action: none;">🎤</button>
                <input type="text" id="m-input" placeholder="Message..." style="flex: 1; height: 38px; border-radius: 20px; border: 1px solid #ccc; padding: 0 15px;" onkeypress="if(event.key==='Enter')send()">
                <button onclick="document.getElementById('fIn').click()" style="background:#6c757d; border-radius: 50%; width: 35px; height: 35px; color: white; border: none; cursor: pointer;">📎</button>
                <button onclick="send()" style="background: #28a745; color: white; border-radius: 5px; height: 38px; border: none; padding: 0 15px; font-weight: bold; cursor: pointer;">Send</button>
            </div>
        </div>
    </div>

    <input type="file" id="fIn" style="display:none" onchange="uploadFile()">
</body>
<script>
        let socket = io(), myUser = "", myRoom = "";
        let mediaRecorder, audioChunks = [], timerInterval, seconds = 0;
        socket.on('match_found', function(data) {
    console.log("✅ Match found! Removing waiting screen...");
    
    // 1. Remove the orange "Notifying Doctors" overlay
    const waitingScreen = document.getElementById('patient-waiting-screen');
    if (waitingScreen) {
        waitingScreen.style.display = 'none'; // or waitingScreen.remove();
    }

    // 2. Open the chat UI
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('chat-container').style.display = 'flex';
    
    myRoom = data.session_id;
    alert("Dr. " + data.doctor + " is ready to assist you.");
});
socket.on('remove_patient_from_list', function(data) {
    console.log("🧹 Clearing all dashboard areas for: " + data.session_id);
    
    // querySelectorAll finds EVERY box with that class
    const allInstances = document.querySelectorAll('.req-' + data.session_id);
    
    allInstances.forEach(el => {
        el.remove(); // This deletes the box, the text, and the button instantly
    });
});
        // 🟠 PATIENT FLOW: Triggered by Orange Button
function startPatientFlow() {
    const name = document.getElementById('username').value;
    if (!name) return alert("Please enter your name to proceed.");
    
    myUser = name;
    // This calls your payment prompt logic we built earlier
    testConsultation(); 
}

// 🟢 DOCTOR FLOW: Triggered by Green Button
// 🟢 DOCTOR FLOW: Specific Access Codes for each Hospital
function startDoctorFlow() {
    const name = document.getElementById('username').value;
    const code = document.getElementById('docCode').value;
    const hosp = document.getElementById('hospSelect').value;

    if (!name) return alert("Doctor, please enter your name.");

    // 🛡️ HOSPITAL CODE DATABASE
    const hospitalCodes = {
        "Mukono": "MUK256",    // Code for Mukono General
        "Wakiso": "WAK412",    // Code for Wakiso Health IV
        "Mulago": "MUL101",    // Code for Mulago National
        "Nakasero": "NAK789"   // Code for Nakasero Hospital
    };

    // Check if the code matches the selected hospital
    const correctCode = hospitalCodes[hosp];

    if (code !== correctCode) {
        return alert(`Invalid Access Code for ${hosp}. Please contact the Hospital Admin.`);
    }

    myUser = "Dr. " + name;
    
    // Join the specific Lounge (Free Entrance)
    socket.emit('join_lounge', { doctor: myUser, hospital: hosp });
    
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('doctor-dashboard').style.display = 'block';
    
    console.log(`${myUser} is now online at ${hosp}`);
}
// A. When a patient pays, this shows the request to ALL doctors in that hospital
socket.on('new_patient_waiting', function(data) {
    const list = document.getElementById('waiting-list');
    
    // THE WRAPPER DIV is what we will delete later
    const item = `
        <div class="req-${data.session_id} patient-card">
            <p><strong>New Patient:</strong> ${data.patient_name}</p>
            
            <button onclick="acceptPatient('${data.session_id}')">ACCEPT</button>
            
            <button onclick="acceptPatient('${data.session_id}')">ACCEPT AND CHAT</button>
        </div>
    `;

    if (list) {
        list.insertAdjacentHTML('beforeend', item);
    }
});

// B. When the doctor clicks ACCEPT
// --- DOCTOR ACTIONS ---

function acceptPatient(sid) {
    const hosp = document.getElementById('hospSelect').value; // Grabs the hospital name
    myRoom = sid; 

    // 1. Tell the server the doctor has accepted
    socket.emit('doctor_accepted_patient', { 
        session_id: sid, 
        doctor_name: myUser,
        hospital: hosp 
    });

    // 2. Move the doctor into the private chat room
    socket.emit('join', { hospital: sid, user: myUser, role: 'Doctor' });

    // 3. Switch the Doctor's UI to Chat
    document.getElementById('doctor-dashboard').style.display = 'none';
    document.getElementById('chat-container').style.display = 'flex';
}
        // 1. PRIVATE CONSULTATION LOGIC
       // 1. UPDATED: Request with GPS Location
// --- 🟠 CONSOLIDATED PATIENT FLOW ---
function testConsultation() {
    const name = document.getElementById('username').value;
    const hosp = document.getElementById('hospSelect').value;

    if (!name) return alert("Please enter your name first!");

    let phone = prompt(`🏥 Hospital: ${hosp}\n💰 Fee: 5,000 UGX\n\nEnter 10-digit Number:`);
    if (!phone || !/^\d{10}$/.test(phone)) return alert("❌ Invalid number!");

    const session_id = "cons-" + Math.random().toString(36).substr(2, 9);
    myUser = name;
    myRoom = session_id;

    // 1. Tell the server to notify doctors
    socket.emit('patient_paid_and_waiting', { 
        patient_name: name, 
        hospital: hosp,
        phone: phone,
        session_id: session_id 
    });

    // 2. IMPORTANT: Join the room IMMEDIATELY so the patient is reachable
    socket.emit('join', { hospital: session_id, user: name, role: 'Patient' });

    // 3. SHOW THE WAITING UI
    document.getElementById('login-overlay').style.display = 'none';
    
    const waitingArea = document.createElement('div');
    waitingArea.id = "patient-waiting-screen";
    waitingArea.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:3000;";
    waitingArea.innerHTML = `
        <div style="text-align:center; padding:30px; font-family:sans-serif; border: 2px solid orange; border-radius: 15px;">
            <h2 style="color: orange;">⏳ Notifying Doctors...</h2>
            <p>Hello <strong>${name}</strong>, looking for a doctor at <strong>${hosp}</strong>.</p>
            <div class="loader-spinner" style="margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid orange; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite;"></div>
            <p style="color: #666;">Please stay on this screen.</p>
        </div>
        <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
    `;
    document.body.appendChild(waitingArea);
}
function enterClinic() {
    const docName = document.getElementById('username').value;
    const hosp = document.getElementById('hospSelect').value;
    
    if (!docName) return alert("Please enter your name first");

    myUser = docName; // Save the doctor's name globally
    
    // 1. Join the "Lounge" (The Green Button path)
    socket.emit('join_lounge', { doctor: docName, hospital: hosp });
    
    // 2. Switch UI
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('doctor-dashboard').style.display = 'block';
}

socket.on('new_patient_waiting', (data) => {
    const list = document.getElementById('waiting-list');
    
    // CHANGE: id="row-..." becomes class="req-${data.session_id}"
    const patientRow = `
        <div class="req-${data.session_id}" style="border: 1px solid #28a745; padding: 10px; margin-bottom: 5px; border-radius: 5px;">
            <p><strong>Patient:</strong> ${data.patient_name}</p>
            <button onclick="acceptPatient('${data.session_id}')" style="...">
                Accept & Start Chat
            </button>
        </div>
    `;
    
    if (list) {
        list.innerHTML = patientRow + list.innerHTML;
    }
});

function acceptPatient(sid) {
    const hosp = document.getElementById('hospSelect').value;
    myRoom = sid; 

    // Tell the server this doctor is taking the case
    socket.emit('doctor_accepted_patient', { 
        session_id: sid, 
        doctor_name: myUser,
        hospital: hosp 
    });

    // The doctor joins the patient's private room
    socket.emit('join', { hospital: sid, user: myUser, role: 'Doctor' });

    // Switch Doctor UI
    document.getElementById('doctor-dashboard').style.display = 'none';
    document.getElementById('chat-container').style.display = 'flex';
}

// --- PATIENT LOGIC ---

        // 2. JOIN & LOGOUT LOGIC
        
        function logout() {
            localStorage.clear();
            sessionStorage.clear(); 
            window.location.reload();
        }

        // 3. MESSAGING & UPLOADS
        // --- 3. MESSAGING & UPLOADS ---

function send() {
    const i = document.getElementById('m-input');
    if (i.value.trim() && myRoom) {
        // ✅ Match the keys the Python server expects
        socket.emit('send_message', { 
            message: i.value, 
            user: myUser, 
            hospital: myRoom,  // This is the session_id
            doctor_name: myUser.startsWith('Dr.') ? myUser : "" 
        });
        i.value = "";
    }
}
        socket.on('receive_message', (data) => {
    const container = document.getElementById('messages'); // Use your actual ID here
    if (!container) return;

    // 1. Create the message element
    const d = document.createElement('div');
    
    // Logic for 'my' vs 'other' bubbles
    const isMe = (data.user === myUser || data.sender === myUser);
    d.className = `msg ${isMe ? 'my' : 'other'}`;

    let content = "";

    // 2. CHECK: Is this Media or Text? (This prevents the "Code Wall")
    if (data.media_url) {
        if (data.media_type === 'image') {
            content = `<img src="${data.media_url}" class="chat-media-style" style="max-width:100%; border-radius:8px; margin-top:5px;">`;
        } else {
            content = `<video controls class="chat-media-style" style="max-width:100%;"><source src="${data.media_url}"></video>`;
        }
    } else {
        // Just regular text
        content = data.message || "";
    }

    // 3. Build the inside of the bubble
    // Note: check if your server uses data.user or data.sender
    const displayName = data.user || data.sender || "Unknown";
    d.innerHTML = `<strong>${displayName}</strong><br>${content}`;
    
    // 4. Add to screen and scroll down
    container.appendChild(d);
    container.scrollTop = container.scrollHeight;

    // 5. SAVE TO HISTORY (Crucial for page refreshes)
    let chat = JSON.parse(sessionStorage.getItem('session_chat') || "[]");
    chat.push(data);
    sessionStorage.setItem('session_chat', JSON.stringify(chat));
});
        // 👂 This is the Patient's "Ear". It waits for the Doctor's signal.


        

        // 4. VOICE & FILE FUNCTIONS (Untouched & Stable)
        async function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                return alert("🚨 HTTPS Required for Microphone");
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (seconds >= 1) sendVoiceNote(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                seconds = 0;
                document.getElementById('timer-display').style.display = "block";
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60), s = seconds % 60;
                    document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }, 1000);
            } catch (err) { alert("Mic Error: " + err.message); }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                document.getElementById('timer-display').style.display = "none";
            }
        }

        async function sendVoiceNote(blob) {
            const formData = new FormData();
            formData.append('file', blob, `voice_${Date.now()}.webm`);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const result = await res.json();
            if (result.success) {
                const audioHTML = `<audio controls src="${result.url}" style="width: 200px; height: 35px;"></audio>`;
                socket.emit('send_message', { message: audioHTML, user: myUser, hospital: myRoom });
            }
        }

        function uploadFile() {
            const file = document.getElementById('fIn').files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            document.getElementById('upload-container').style.display = 'block';
            const xhr = new XMLHttpRequest();
            xhr.upload.onprogress = (e) => {
                const percent = Math.round((e.loaded / e.total) * 100);
                document.getElementById('upload-bar').style.width = percent + '%';
                document.getElementById('upload-text').innerText = "Uploading: " + percent + "%";
            };
            xhr.onload = () => {
                const response = JSON.parse(xhr.responseText);
                document.getElementById('upload-container').style.display = 'none';
                if (response.success) {
                    let content = file.type.startsWith('image/') ? `<img src="${response.url}" style="max-width:250px;">` : `<a href="${response.url}" target="_blank">View File</a>`;
                    socket.emit('send_message', { message: content, user: myUser, hospital: myRoom });
                }
            };
            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        // Connect Mic Button to Functions
        const mBtn = document.getElementById('mic-btn');
        if(mBtn) {
            mBtn.addEventListener('mousedown', startRecording);
            mBtn.addEventListener('mouseup', stopRecording);
            mBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
            mBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
        }
    </script>
</body>
</html>
