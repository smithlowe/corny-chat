<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #e5ddd5; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 500px; height: 100%; background: #fff; display: flex; flex-direction: column; }
        
        header { background: #075e54; color: white; padding: 15px; flex-shrink: 0; text-align: center; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; background: #f0f2f5; }

        .msg-row { margin-bottom: 12px; display: flex; align-items: flex-end; gap: 8px; }
        .is-me { flex-direction: row-reverse; }
        .pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .bubble { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine { background: #dcf8c6; }
        .theirs { background: #fff; }

        .input-bar { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        #msg-in { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { width: 42px; height: 42px; border-radius: 50%; background: #075e54; color: white; border: none; font-size: 18px; cursor: pointer; }

        #login { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pfp-pick { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #075e54; margin-bottom: 15px; cursor: pointer; object-fit: cover; }
    </style>
</head>
<body>
<div id="app">
    <div id="login">
        <img id="pre" class="pfp-pick" src="https://api.dicebear.com/7.x/bottts/svg?seed=1" onclick="document.getElementById('fin').click()">
        <input type="file" id="fin" accept="image/*" style="display:none" onchange="imgL(this)">
        <input type="text" id="nin" placeholder="Enter Name" style="width:250px; padding:12px; border-radius:20px; border:1px solid #ddd; text-align:center; margin-bottom:15px;">
        <button onclick="go()" class="btn" style="width:150px; border-radius:20px;">Join Chat</button>
    </div>
    <header><strong>Global Social</strong></header>
    <div id="chat"></div>
    <div class="input-bar">
        <input type="text" id="msg-in" placeholder="Message" onkeypress="if(event.key==='Enter')send()">
        <button id="mic" class="btn" onclick="voc()">🎙️</button>
        <button class="btn" onclick="send()">➤</button>
    </div>
</div>
<script>
    const socket = io();
    let myN = localStorage.getItem('cn') || "", myP = localStorage.getItem('cp') || "", rec, bits = [];
    if (myN) document.getElementById('login').style.display = 'none';

    function imgL(i) {
        if (i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { document.getElementById('pre').src = e.target.result; myP = e.target.result; };
            r.readAsDataURL(i.files[0]);
        }
    }
    function go() {
        const n = document.getElementById('nin').value.trim();
        if (n) { myN = n; localStorage.setItem('cn', n); localStorage.setItem('cp', myP); document.getElementById('login').style.display = 'none'; }
    }
    function send() {
        const i = document.getElementById('msg-in');
        if (i.value.trim()) { socket.emit('message', {username: myN, message: i.value, profile_pic: myP, is_audio: false}); i.value = ''; }
    }
    async function voc() {
        const b = document.getElementById('mic');
        if (!rec || rec.state === "inactive") {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            rec = new MediaRecorder(s); bits = [];
            rec.ondataavailable = e => bits.push(e.data);
            rec.onstop = () => {
                const r = new FileReader(); r.readAsDataURL(new Blob(bits));
                r.onloadend = () => socket.emit('message', {username: myN, message: r.result, profile_pic: myP, is_audio: true});
            };
            rec.start(); b.style.background = "red";
        } else { rec.stop(); b.style.background = "#075e54"; }
    }
    socket.on('message', d => {
        const w = document.getElementById('chat'); const me = d.username === myN;
        const pic = d.profile_pic || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.username}`;
        w.innerHTML += `<div class="msg-row ${me ? 'is-me' : ''}">
            <img src="${pic}" class="pfp">
            <div class="bubble ${me ? 'mine' : 'theirs'}">
                ${!me ? `<span style="font-size:10px; font-weight:bold; color:#075e54; display:block;">${d.username}</span>` : ''}
                ${d.is_audio ? `<audio controls src="${d.message}"></audio>` : d.message}
            </div></div>`;
        w.scrollTop = w.scrollHeight;
    });
</script>
</body>
</html>
