<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny-Comm Medical Portal</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        /* 🎨 Global & Layout Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #login-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        
        #chat-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; flex-direction: column; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        
        .btn-red { background: #dc3545; }

        /* 💬 Chat Bubbles */
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; word-wrap: break-word; font-size: 15px; margin-bottom: 8px; display: block; }
        .my { align-self: flex-end !important; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start !important; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }

        /* 🏥 Header */
        .chat-header { background: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; width: 100%; z-index: 1001; box-sizing: border-box; }

        /* 📜 Messages Container */
        #messages { margin-top: 70px; margin-bottom: 130px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding: 15px; background: #f9f9f9; height: calc(100vh - 200px); flex: 1; }

        /* 📥 The Input Area (Fixed to Bottom) */
        .chat-input-area { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #ddd; background: white; z-index: 1000; box-sizing: border-box; }

        /* 🛡️ Login Overlay */
        #login-overlay { background: #f0f2f5; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center;">
            <h2 style="color: #007bff; margin-bottom: 10px;">🏥 Corny-Comm Portal</h2>
            <p style="color: #65676b; margin-bottom: 20px;">Please enter your details to join the consultation.</p>
            
            <input type="text" id="username" placeholder="Your Full Name">
            
            <select id="role" onchange="document.getElementById('accessCodeWrapper').style.display=(this.value=='Doctor'?'block':'none')">
                <option value="Patient">I am a Patient</option>
                <option value="Doctor">I am a Doctor</option>
            </select>

            <div id="accessCodeWrapper" style="display:none;">
                <input type="password" id="accessCode" placeholder="Doctor Access Code">
            </div>

            <select id="hospital">
                <option value="Mulago">Mulago Hospital</option>
                <option value="Nakasero">Nakasero Hospital</option>
                <option value="Mukono">Mukono Clinic</option>
            </select>

            <input type="text" id="room_id" placeholder="Consultation ID (e.g. ROOM-101)">
            
            <button onclick="join()">JOIN LOBBY</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="chat-header">
            <span id="chat-status">🟢 Active Consultation</span>
            <button onclick="logout()" class="btn-red" style="width:auto; margin:0; padding: 5px 15px;">LEAVE</button>
        </div>

        <div id="messages">
            </div>

        <div class="chat-input-area" style="padding: 10px; background: white; border-top: 1px solid #eee;">
    <div id="uploadContainer" style="display:none; width: 100%; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 8px;">
        <div id="progressBar" style="width: 0%; height: 12px; background: #00d1b2; transition: width 0.3s; color: white; font-size: 10px; text-align: center; line-height: 12px;">0%</div>
    </div>

    <div style="display: flex; gap: 6px; align-items: center; width: 100%;">
        
        <div class="mic-container" style="display: flex; align-items: center; position: relative; flex-shrink: 0;">
            <span id="timer-display" style="position: absolute; top: -30px; left: 0; color: #dc3545; font-weight: bold; font-family: monospace; display: none; background: white; padding: 2px 6px; border-radius: 5px; border: 1px solid #ddd; font-size: 12px; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">0:00</span>
            
            <button type="button" id="mic-btn" style="background: #007bff; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 20px;">
                🎤
            </button>
        </div>

        <input type="text" id="m-input" placeholder="Type message..." 
               style="flex-grow: 1; min-width: 0; padding: 12px 15px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; height: 42px;" 
               onkeypress="if(event.key==='Enter')send()">
        
        <button type="button" onclick="document.getElementById('fileInput').click()" 
                style="background:none; border:none; font-size:22px; cursor:pointer; padding: 0 5px; color: #555; flex-shrink: 0;">📎</button>
        
        <button onclick="send()" 
                style="background: #007bff; color: white; border: none; height: 42px; padding: 0 15px; border-radius: 25px; font-weight: bold; cursor: pointer; flex-shrink: 0;">Send</button>
    </div>

    <input type="file" id="fileInput" style="display: none;" onchange="uploadMedicalFile()">
</div>

            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="m-input" placeholder="Type a message..." style="flex: 1; margin: 0;" onkeypress="if(event.key==='Enter')send()">
                
                <button type="button" onclick="document.getElementById('fileInput').click()" style="width: auto; background: none; border: none; font-size: 24px; cursor: pointer; color: #555;">📎</button>
                
                <button onclick="send()" style="width: auto; margin: 0; padding: 10px 20px; border-radius: 20px;">Send</button>
            </div>

            <input type="file" id="fileInput" style="display: none;" onchange="uploadMedicalFile()">
        </div>
    </div>

    <script>
        // 1. GLOBAL VARIABLES
    let mediaRecorder;
    let audioChunks = [];
    let timerInterval;
    let seconds = 0;
    let myUsername = "";
    let myRoom = "";

    // 2. WEBSOCKET INITIALIZATION
    var socket = io({
        transports: ['websocket', 'polling'],
        upgrade: true
    });

    // 3. INITIALIZATION & VOICE LISTENERS
    document.addEventListener('DOMContentLoaded', () => {
        const micBtn = document.getElementById('mic-btn');
        
        // Setup Mic Listeners
        if (micBtn) {
            micBtn.addEventListener('mousedown', startRecording);
            micBtn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                startRecording(); 
            });
        }

        // Global Release Listeners
        window.addEventListener('mouseup', stopRecording);
        window.addEventListener('touchend', stopRecording);

        // Check for existing session and set global variables
        if (localStorage.getItem('n')) {
            myUsername = localStorage.getItem('n');
            myRoom = localStorage.getItem('r_id');
            showChatUI();
            rejoinRoom();
        }
    });

    // 4. VOICE FUNCTIONS
    async function startRecording() {
        const micBtn = document.getElementById('mic-btn');
        const timerDisplay = document.getElementById('timer-display');

        if (mediaRecorder && mediaRecorder.state === "recording") return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                if (seconds >= 1) { 
                    sendVoiceNote(audioBlob);
                }
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            
            seconds = 0;
            timerDisplay.innerText = "0:00";
            timerDisplay.style.display = "inline";
            micBtn.style.background = "#dc3545"; 
            micBtn.style.transform = "scale(1.2)";

            timerInterval = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                timerDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);

        } catch (err) {
            alert("Microphone access denied. Please allow mic access.");
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            
            const micBtn = document.getElementById('mic-btn');
            const timerDisplay = document.getElementById('timer-display');
            
            micBtn.style.background = "#007bff"; 
            micBtn.style.transform = "scale(1)"; 
            timerDisplay.style.display = "none";
        }
    }

    async function sendVoiceNote(blob) {
        const formData = new FormData();
        formData.append('file', blob, `voice_${Date.now()}.webm`);

        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
            const audioMsg = `<audio src="${data.url}" controls style="height: 35px; width: 220px; display: block; margin-top:5px;"></audio>`;
            
            socket.emit('send_message', {
                user: myUsername,
                message: audioMsg,
                room_id: myRoom 
            });
        }
    }
        function showChatUI() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
        }

        function rejoinRoom() {
            myUsername = localStorage.getItem('n');
            myRoom = localStorage.getItem('r_id');
            socket.emit('join', { 
                user: myUsername, 
                room: myRoom,
                hospital: localStorage.getItem('h'), 
                role: localStorage.getItem('r') 
            });
        }

        async function join() {
            const user = document.getElementById('username').value.trim();
            const room = document.getElementById('room_id').value.trim();
            const role = document.getElementById('role').value;
            const hosp = document.getElementById('hospital').value;
            const code = document.getElementById('accessCode').value;

            if (!user || !room) return alert("Please enter your name and Room ID");

            if (role === 'Doctor') {
                const res = await fetch('/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hospital: hosp, code: code, name: user })
                });
                const data = await res.json();
                if (!data.success) return alert("Invalid Code!");
            }

            myUsername = user;
            myRoom = room;

            localStorage.setItem('n', user);
            localStorage.setItem('h', hosp);
            localStorage.setItem('r', role);
            localStorage.setItem('r_id', room);

            showChatUI();
            socket.emit('join', { user: myUsername, room: myRoom });
        }

        function send() {
    const input = document.getElementById('m-input');
    if (!input.value.trim()) return;

    socket.emit('send_message', {
        user: myUsername, // Uses the global variable
        message: input.value,
        room_id: myRoom    // Uses the global variable
    });
    input.value = "";
}

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // LISTENERS
        socket.on('receive_message', function(data) {
            const messagesContainer = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            
            const isMe = data.user === myUsername;
            msgDiv.className = `msg ${isMe ? 'my' : 'other'}`;
            msgDiv.innerHTML = `<strong>${data.user}:</strong> <br> ${data.message}`;
            
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        socket.on('status', (data) => {
            const msgDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.style.cssText = "text-align:center; font-size:11px; color:#888; margin:5px;";
            div.textContent = data.msg;
            msgDiv.appendChild(div);
        });

        function uploadMedicalFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const container = document.getElementById('uploadContainer');
            const bar = document.getElementById('progressBar');
            container.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            // Use XMLHttpRequest to track progress
            const xhr = new XMLHttpRequest();
            
            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    bar.style.width = percent + '%';
                    bar.innerText = percent + '%';
                }
            };

            xhr.onload = function() {
                container.style.display = 'none';
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    let mediaTag = "";

                    if (file.type.startsWith('image/')) {
                        mediaTag = `<img src="${data.url}" style="max-width: 100%; border-radius: 10px; display: block; margin: 10px 0;">`;
                    } else if (file.type.startsWith('video/')) {
                        mediaTag = `<video src="${data.url}" controls style="max-width: 100%; border-radius: 10px;"></video>`;
                    } else {
                        mediaTag = `📎 <a href="${data.url}" target="_blank" style="color: #007bff;">View Document: ${file.name}</a>`;
                    }

                    socket.emit('send_message', {
                        user: myUsername,
                        message: mediaTag, 
                        room_id: myRoom
                    });
                    fileInput.value = ''; 
                } else {
                    alert("Upload failed.");
                }
            };

            xhr.open('POST', '/upload', true);
            xhr.send(formData);
        }
    </script>
</body>
</html>
