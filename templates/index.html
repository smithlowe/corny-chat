<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; border: 1px solid #ddd; }
        .bubble { padding: 10px; border-radius: 12px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me .bubble { background: #dcf8c6; }
        .input-area { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        #login { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .preview { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #075e54; margin-bottom: 15px; cursor: pointer; object-fit: cover; }
        .btn-icon { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; }
        audio { height: 35px; width: 180px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="login">
    <img id="pre" class="preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=1" onclick="document.getElementById('file').click()">
    <input type="file" id="file" hidden accept="image/*" onchange="upload(this)">
    <input type="text" id="user-in" placeholder="Your Name" style="width: 200px; padding: 10px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd;">
    <button onclick="join()" style="padding: 10px 40px; background: #075e54; color: white; border: none; border-radius: 20px;">Join</button>
</div>

<header>
    <button onclick="clearChat()" class="btn-icon">🗑️</button>
    <strong>Global Social</strong>
    <button onclick="document.getElementById('file').click()" class="btn-icon">📷</button>
</header>

<div id="chat"></div>

<div class="input-area">
    <button id="rec-btn" class="btn-icon">🎤</button>
    <input type="text" id="msg-in" placeholder="Message" onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()" class="btn-icon" style="color:#075e54;">➤</button>
</div>

<script>
    const socket = io();
    let myN = localStorage.getItem('un') || "";
    let myP = localStorage.getItem('up') || "";
    let mediaRecorder;
    let audioChunks = [];

    if(myN) document.getElementById('login').style.display = 'none';

    function upload(input) {
        const reader = new FileReader();
        reader.onload = e => {
            myP = e.target.result;
            document.getElementById('pre').src = myP;
            localStorage.setItem('up', myP);
        };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function join() {
        const val = document.getElementById('user-in').value.trim();
        if(val) { myN = val; localStorage.setItem('un', val); document.getElementById('login').style.display = 'none'; }
    }

    function send() {
        const input = document.getElementById('msg-in');
        if(input.value.trim() && myN) {
            socket.emit('message', {username: myN, message: input.value, profile_pic: myP});
            input.value = '';
        }
    }

    // --- Voice Recording Logic ---
    const recBtn = document.getElementById('rec-btn');
    recBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        socket.emit('message', { username: myN, message: "🎤 Voice Note", audio: reader.result, profile_pic: myP });
                    };
                };
                mediaRecorder.start();
                recBtn.style.color = "red";
            } catch (err) { alert("Microphone access denied."); }
        } else {
            mediaRecorder.stop();
            recBtn.style.color = "#075e54";
        }
    };

    function clearChat() {
        if(confirm("Wipe chat?")) socket.emit('message', {message: "/clear_now"});
    }

    socket.on('message', d => {
        const isMe = d.username === myN;
        const pic = d.profile_pic || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.username}`;
        
        let content = d.message;
        if(d.audio) {
            content = `<audio controls src="${d.audio}"></audio>`;
        }

        const html = `
            <div class="msg ${isMe ? 'me' : ''}">
                <img src="${pic}" class="pfp">
                <div class="bubble">
                    ${!isMe ? `<small style="font-weight:bold; color:#075e54;">${d.username}</small><br>` : ''}
                    ${content}
                </div>
            </div>`;
        document.getElementById('chat').insertAdjacentHTML('beforeend', html);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    });

    socket.on('reload', () => location.reload());
</script>
</body>
</html>
