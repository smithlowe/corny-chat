<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #e5ddd5; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 80%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #eee; border: 1px solid #ccc; }
        .bubble { padding: 8px 12px; border-radius: 12px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); font-size: 15px; }
        .me .bubble { background: #dcf8c6; }
        .input-area { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        #login { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .preview { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; margin-bottom: 20px; cursor: pointer; }
        button { cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <h2 style="color: #075e54;">Global Social</h2>
    <img id="pre" class="preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=welcome" onclick="document.getElementById('file').click()">
    <input type="file" id="file" hidden accept="image/*" onchange="upload(this)">
    <input type="text" id="user-in" placeholder="Enter Your Name" style="flex:none; width: 220px; margin-bottom: 20px;">
    <button onclick="join()" style="padding: 12px 40px; border-radius: 25px; background: #075e54; color: white; border: none; font-weight: bold;">JOIN CHAT</button>
</div>

<header>
    <button onclick="clearChat()" style="background:none; border:none; font-size:20px;">🗑️</button>
    <strong>Global Social</strong>
    <button onclick="document.getElementById('file').click()" style="background:none; border:none; font-size:20px;">📷</button>
</header>

<div id="chat"></div>

<div class="input-area">
    <input type="text" id="msg-in" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()" style="border:none; background:none; font-size:28px; color:#075e54;">➤</button>
</div>

<script>
    const socket = io();
    let myN = localStorage.getItem('un') || "";
    let myP = localStorage.getItem('up') || "";

    if(myN) document.getElementById('login').style.display = 'none';

    function upload(input) {
        const reader = new FileReader();
        reader.onload = e => {
            myP = e.target.result;
            document.getElementById('pre').src = myP;
            localStorage.setItem('up', myP);
        };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function join() {
        const val = document.getElementById('user-in').value.trim();
        if(val) { 
            myN = val; 
            localStorage.setItem('un', val); 
            document.getElementById('login').style.display = 'none'; 
        }
    }

    function send() {
        const input = document.getElementById('msg-in');
        if(input.value.trim() && myN) {
            socket.emit('message', {username: myN, message: input.value, profile_pic: myP});
            input.value = '';
        }
    }

    function clearChat() {
        if(confirm("Delete all messages for everyone?")) {
            socket.emit('message', {message: "/clear_now"});
        }
    }

    socket.on('message', d => {
        const chat = document.getElementById('chat');
        const isMe = d.username === myN;
        const pic = d.profile_pic || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.username}`;
        
        const html = `
            <div class="msg ${isMe ? 'me' : ''}">
                <img src="${pic}" class="pfp">
                <div class="bubble">
                    ${!isMe ? `<small style="color:#075e54; font-weight:bold;">${d.username}</small><br>` : ''}
                    ${d.message}
                </div>
            </div>`;
        chat.insertAdjacentHTML('beforeend', html);
        chat.scrollTop = chat.scrollHeight;
    });

    socket.on('reload', () => location.reload());
</script>
</body>
</html>
