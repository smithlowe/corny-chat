<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChatApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3>Welcome Back</h3>
        <p class="text-muted">Please sign in to continue</p>
        <hr>
        <!-- Standard Login -->
        <form action="/login" method="POST" class="mb-3">
            <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        
        <div class="mb-3">OR</div>

        <!-- Google Login -->
        <a href="/login/google" class="btn btn-outline-danger w-100">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" class="me-2">
            Sign in with Google
        </a>
    </div>
</body>
</html>
