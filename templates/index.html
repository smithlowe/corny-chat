<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Corny-Comm Medical</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #login-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 25px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .doc-btn { background: #28a745; font-size: 0.9em; }
        #chat-container { display: none; flex-direction: column; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 0.95em; }
        .my-msg { align-self: flex-end; background: #007bff; color: white; }
        .other-msg { align-self: flex-start; background: #e9ecef; color: #333; }
        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body>

    <div id="login-container">
        <h1 style="margin:0;">🏥</h1>
        <h2>Corny-Comm</h2>
        <input type="text" id="username" placeholder="Full Name">
        <select id="role" onchange="document.getElementById('accessCode').style.display=(this.value=='Doctor'?'block':'none')">
            <option value="Patient">Patient</option>
            <option value="Doctor">Doctor</option>
        </select>
        <input type="password" id="accessCode" placeholder="Doctor Passcode" style="display:none;">
        <select id="hospital">
            <option value="Mulago">Mulago Hospital</option>
            <option value="Nakasero">Nakasero Hospital</option>
            <option value="Mukono">Mukono Hospital</option>
        </select>
        <button id="main-btn" onclick="joinClinic()">ENTER LOBBY</button>
        <button id="logout-btn" onclick="doctorLogout()" style="display:none; background:#6c757d;">GO OFFLINE (LOGOUT)</button>
        <div id="doctor-list-section" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
            <p><small>Available Doctors:</small></p>
            <div id="doctor-buttons"></div>
        </div>
    </div>

    <div id="chat-container">
        <div style="background:#007bff; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <span id="header-title">Consultation</span>
            <button onclick="endConsultation()" style="width:auto; background:#dc3545; margin:0; padding:5px 15px;">END</button>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="messageInput" placeholder="Type message...">
            <button onclick="sendMessage()" style="width:auto;">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName, myHospital, myDoctor, myRole;

        window.onload = () => {
            myName = localStorage.getItem('corny_name');
            myHospital = localStorage.getItem('corny_hospital');
            myRole = localStorage.getItem('corny_role');
            myDoctor = localStorage.getItem('corny_doctor');

            if (myName && myHospital) {
                document.getElementById('username').value = myName;
                document.getElementById('hospital').value = myHospital;
                document.getElementById('role').value = myRole;
                setupLobbyUI();
                socket.emit('join', {name: myName, hospital: myHospital, role: myRole, doctor_name: myDoctor});
                if (myDoctor && myDoctor !== "null") showChat(myDoctor);
            }
        };

        async function joinClinic() {
            myName = document.getElementById('username').value;
            myHospital = document.getElementById('hospital').value;
            myRole = document.getElementById('role').value;
            const code = document.getElementById('accessCode').value;

            if (!myName) return alert("Name required");
            if (myRole === 'Doctor') {
                const res = await fetch('/verify-code', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({hospital: myHospital, code: code})
                });
                if (!(await res.json()).success) return alert("Invalid Code");
                myDoctor = myName;
            }

            localStorage.setItem('corny_name', myName);
            localStorage.setItem('corny_hospital', myHospital);
            localStorage.setItem('corny_role', myRole);
            localStorage.setItem('corny_doctor', myDoctor);

            setupLobbyUI();
            socket.emit('join', {name: myName, hospital: myHospital, role: myRole, doctor_name: myDoctor});
        }

        function setupLobbyUI() {
            document.getElementById('main-btn').innerText = "Logged in as " + myRole;
            document.getElementById('main-btn').disabled = true;
            if (myRole === 'Doctor') document.getElementById('logout-btn').style.display = 'block';
            if (myRole === 'Patient') document.getElementById('doctor-list-section').style.display = 'block';
        }

        function doctorLogout() {
            if(confirm("Going offline?")) {
                socket.emit('doctor_logout', {hospital: myHospital, name: myName});
                localStorage.clear();
                location.reload();
            }
        }

        socket.on('update_doctor_list', (docs) => {
            const container = document.getElementById('doctor-buttons');
            container.innerHTML = docs.length ? "" : "<small>Waiting for doctors...</small>";
            docs.forEach(doc => {
                const b = document.createElement('button');
                b.className = "doc-btn"; b.innerText = "Consult " + doc;
                b.onclick = () => {
                    myDoctor = doc;
                    localStorage.setItem('corny_doctor', doc);
                    socket.emit('request_consultation', {patient: myName, doctor: doc, hospital: myHospital});
                    b.innerText = "Requesting..."; b.disabled = true;
                };
                container.appendChild(b);
            });
        });

        socket.on('consultation_request', (data) => {
            if (myRole === 'Doctor' && myName === data.doctor) {
                if (confirm("Accept patient " + data.patient + "?")) {
                    socket.emit('accept_patient', {doctor: myName, hospital: myHospital, patient: data.patient});
                }
            }
        });

        socket.on('start_session', (data) => {
            if (myRole === 'Doctor' && myName === data.doctor) showChat(data.patient);
            else if (myRole === 'Patient' && myName === data.patient) {
                myDoctor = data.doctor;
                localStorage.setItem('corny_doctor', data.doctor);
                showChat(data.doctor);
            }
        });

        function showChat(title) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('header-title').innerText = "With: " + title;
        }

        function sendMessage() {
            const i = document.getElementById('messageInput');
            if (!i.value.trim()) return;
            socket.emit('send_message', {
                user: myName, message: i.value, hospital: myHospital, doctorName: myDoctor
            });
            i.value = "";
        }

        socket.on('receive_message', (data) => {
            if (data.doctorName === myDoctor) {
                const d = document.createElement('div');
                d.className = `message ${data.user === myName ? 'my-msg' : 'other-msg'}`;
                d.innerHTML = `<b>${data.user}:</b> ${data.message}`;
                document.getElementById('messages').appendChild(d);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        });

        socket.on('load_history', (msgs) => {
            document.getElementById('messages').innerHTML = "";
            msgs.forEach(m => {
                const d = document.createElement('div');
                d.className = `message ${m.sender === myName ? 'my-msg' : 'other-msg'}`;
                d.innerHTML = `<b>${m.sender}:</b> ${m.content}`;
                document.getElementById('messages').appendChild(d);
            });
        });

        function endConsultation() {
            if(confirm("End this session?")) {
                socket.emit('end_session_global', {hospital: myHospital, doctor: myDoctor});
            }
        }

        socket.on('force_exit_session', (data) => {
            if (myDoctor === data.doctor) {
                localStorage.removeItem('corny_doctor');
                myDoctor = null;
                document.getElementById('chat-container').style.display = 'none';
                document.getElementById('login-container').style.display = 'block';
                document.getElementById('messages').innerHTML = "";
            }
        });
    </script>
</body>
</html>
