<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny Chat 🌽</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #fffef0; text-align: center; padding: 20px; margin: 0; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffd700; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #main-chat { display: none; flex-direction: column; align-items: center; }
        #chat-box { width: 100%; max-width: 500px; height: 400px; border: 2px solid #ffd700; margin: 20px auto; overflow-y: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .message { text-align: left; background: #fdfdfd; padding: 10px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #ffd700; }
        .controls { display: flex; gap: 10px; width: 100%; max-width: 500px; margin: 0 auto; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        button { padding: 12px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; background: #ffd700; }
        #record-btn.recording { background: #ff4444; color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Welcome to Corny Chat 🌽</h1>
        <input type="text" id="username-input" placeholder="Enter your name...">
        <button onclick="joinChat()">Join Chat</button>
    </div>

    <div id="main-chat">
        <h1>Corny Chat 🌽</h1>
        <div style="font-weight: bold;">Online: <span id="user-count">0</span> Users</div>
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendText()">Send 🌽</button>
            <button id="record-btn">🎤 Record</button>
        </div>
    </div>

    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const loginScreen = document.getElementById('login-screen');
        const mainChat = document.getElementById('main-chat');
        const recordBtn = document.getElementById('record-btn');
        let myName = localStorage.getItem('corny_name');
        let mediaRecorder;
        let chunks = [];

        // 1. AUTO-LOGIN CHECK
        if (myName) {
            loginScreen.style.display = 'none';
            mainChat.style.display = 'flex';
            socket.emit('user_joined', { name: myName });
        }

        // 2. LOAD LOCAL MESSAGE HISTORY
        const savedChat = localStorage.getItem('chat_history');
        if (savedChat) {
            chatBox.innerHTML = savedChat;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function joinChat() {
            const input = document.getElementById('username-input');
            if (input.value.trim() !== "") {
                myName = input.value.trim();
                localStorage.setItem('corny_name', myName); // Remember name
                loginScreen.style.display = 'none';
                mainChat.style.display = 'flex';
                socket.emit('user_joined', { name: myName });
            }
        }

        function sendText() {
            const msgInput = document.getElementById('msg-input');
            if (msgInput.value.trim()) {
                socket.emit('message', { content: msgInput.value, user: myName });
                msgInput.value = '';
            }
        }

        socket.on('render_msg', (data) => {
            const div = document.createElement('div');
            div.className = 'message';
            const sender = data.user === myName ? "Me" : data.user;
            
            if (data.type === 'text') {
                div.innerHTML = `<strong>${sender}:</strong> ${data.content}`;
            } else {
                div.innerHTML = `<strong>${sender}:</strong> <audio src="${data.content}" controls></audio>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Save history locally after every new message
            localStorage.setItem('chat_history', chatBox.innerHTML);
        });

        socket.on('user_count', (data) => {
            document.getElementById('user-count').innerText = data.count;
        });

        // VOICE RECORDING LOGIC
        recordBtn.onmousedown = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => socket.emit('voice_note', { audio: reader.result, user: myName });
                };
                mediaRecorder.start();
                recordBtn.innerText = "Recording...";
                recordBtn.classList.add('recording');
            } catch (err) { alert("Mic access denied"); }
        };

        recordBtn.onmouseup = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                recordBtn.innerText = "🎤 Record";
                recordBtn.classList.remove('recording');
            }
        };
    </script>
</body>
</html>
