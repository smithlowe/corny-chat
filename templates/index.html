<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny Chat 🌽</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #fffef0; text-align: center; }
        #chat-box { width: 90%; max-width: 500px; height: 400px; border: 2px solid #ffd700; margin: 20px auto; overflow-y: auto; background: white; padding: 10px; border-radius: 10px; }
        .message { text-align: left; background: #f9f9f9; padding: 8px; margin: 5px; border-radius: 5px; border-left: 5px solid #ffd700; }
        .controls { margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        #record-btn.recording { background: red; color: white; }
    </style>
</head>
<body>
    <h1>Corny Chat 🌽</h1>
    <div>Online: <span id="user-count">0</span></div>
    <div id="chat-box"></div>
    <div class="controls">
        <input type="text" id="msg-input" placeholder="Type here...">
        <button onclick="sendText()">Send</button>
        <button id="record-btn">🎤 Hold to Record</button>
    </div>

    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const userCount = document.getElementById('user-count');

        // Update user count
        socket.on('user_count', (data) => { userCount.innerText = data.count; });

        // Function to send text
        function sendText() {
            const input = document.getElementById('msg-input');
            if (input.value) {
                socket.emit('message', { content: input.value });
                input.value = '';
            }
        }

        // Receive and display messages (Text or Voice)
        socket.on('render_msg', (data) => {
            const div = document.createElement('div');
            div.className = 'message';
            if (data.type === 'text') {
                div.innerHTML = `<strong>User:</strong> ${data.content}`;
            } else {
                div.innerHTML = `<strong>User:</strong> <audio src="${data.content}" controls></audio>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Voice Recording Logic
        const recordBtn = document.getElementById('record-btn');
        let mediaRecorder;
        let chunks = [];

        recordBtn.onmousedown = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => socket.emit('voice_note', { audio: reader.result });
            };
            mediaRecorder.start();
            recordBtn.classList.add('recording');
        };

        recordBtn.onmouseup = () => {
            if(mediaRecorder) {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
            }
        };
    </script>
</body>
</html>
