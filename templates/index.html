<!DOCTYPE html>
<html>
<head>
    <title>Corny Chat 🌽</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive; background: #fff9c4; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { background: white; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 2px solid #fbc02d; width: fit-content; }
        .controls { padding: 20px; background: #fbc02d; display: flex; gap: 10px; }
        input { padding: 10px; border-radius: 20px; border: none; outline: none; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="controls">
        <input type="text" id="user" placeholder="Name" style="width: 80px;">
        <input type="text" id="msg" placeholder="Type a corny message..." style="flex: 1;">
        <button onclick="send()">Send 🌽</button>
    </div>

    <script>
        const socket = io();
        
        function send() {
            const u = document.getElementById('user').value || "Anonymous";
            const m = document.getElementById('msg').value;
            if(m) {
                socket.emit('message', { user: u, msg: m });
                document.getElementById('msg').value = '';
            }
        }

        socket.on('message', d => {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${d.user}:</b> ${d.msg}`;
            document.getElementById('chat').appendChild(div);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        });
    </script>
</body>
</html>
