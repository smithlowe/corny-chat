<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 10px; display: flex; align-items: flex-end; gap: 8px; }
        .msg.me { flex-direction: row-reverse; }
        .pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #eee; }
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 10px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me .bubble { background: #dcf8c6; }
        .input-area { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        #login { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #075e54; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <h3>Join Global Social</h3>
    <img id="pre" class="preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=1" onclick="document.getElementById('file').click()">
    <input type="file" id="file" hidden accept="image/*" onchange="upload(this)">
    <input type="text" id="user-in" placeholder="Enter Name" style="flex:none; width: 200px; margin-bottom: 10px;">
    <button onclick="join()" style="padding: 10px 30px; border-radius: 20px; background: #075e54; color: white; border: none;">Start</button>
</div>

<header>
    <button onclick="clearChat()" style="background:none; border:none; font-size:20px; cursor:pointer;">🗑️</button>
    <strong>Global Social</strong>
    <button onclick="document.getElementById('file').click()" style="background:none; border:none; font-size:20px; cursor:pointer;">📷</button>
</header>

<div id="chat"></div>

<div class="input-area">
    <input type="text" id="msg-in" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()" style="border:none; background:none; font-size:25px; cursor:pointer;">➤</button>
</div>

<script>
    const socket = io();
    let myN = localStorage.getItem('un') || "";
    let myP = localStorage.getItem('up') || "";

    if(myN) document.getElementById('login').style.display = 'none';

    function upload(input) {
        const reader = new FileReader();
        reader.onload = e => {
            myP = e.target.result;
            document.getElementById('pre').src = myP;
            localStorage.setItem('up', myP);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function join() {
        const val = document.getElementById('user-in').value;
        if(val) { myN = val; localStorage.setItem('un', val); document.getElementById('login').style.display = 'none'; }
    }

    function send() {
        const input = document.getElementById('msg-in');
        if(input.value.trim()) {
            socket.emit('message', {username: myN, message: input.value, profile_pic: myP});
            input.value = '';
        }
    }

    function clearChat() {
        if(confirm("Wipe all messages?")) socket.emit('message', {message: "/clear_all_now"});
    }

    socket.on('message', d => {
        const isMe = d.username === myN;
        const pic = d.profile_pic || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.username}`;
        const html = `<div class="msg ${isMe?'me':''}">
            <img src="${pic}" class="pfp">
            <div class="bubble"><b>${isMe?'':d.username+'<br>'}</b>${d.message}</div>
        </div>`;
        document.getElementById('chat').insertAdjacentHTML('beforeend', html);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    });

    socket.on('reload', () => location.reload());
</script>
</body>
</html>
