<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny-Comm Medical Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        #timer-display {
    position: absolute;
    top: -45px; /* Sits above the mic */
    left: 50%;
    transform: translateX(-50%);
    background: #dc3545;
    color: white;
    padding: 5px 10px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 14px;
    display: none; /* Hidden until recording starts */
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    z-index: 100;
}
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        #chat-container { display: none; flex-direction: column; height: 100vh; background: white; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; margin-top: 60px; margin-bottom: 110px; display: flex; flex-direction: column; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; margin-bottom: 10px; font-size: 15px; }
        .my { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 2px; }
        .chat-header { background: #007bff; color: white; padding: 15px; position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; z-index: 10; box-sizing: border-box; }
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #f8f9fa; border-top: 1px solid #ddd; display: grid; grid-template-columns: 50px 1fr 40px 70px; gap: 8px; align-items: center; box-sizing: border-box; }
        #login-overlay { position: fixed; inset: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 20; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 2000; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h2 style="color: #007bff; margin-bottom: 20px;">🏥 Corny-Comm</h2>
            
            <button onclick="testConsultation()" style="width: 100%; padding: 12px; background: orange; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px;">
                Test Private Consultation
            </button>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">

            <input type="text" id="username" placeholder="Full Name" style="width:100%; padding: 10px; margin-bottom:10px; border: 1px solid #ccc; border-radius: 5px;">
            
            <select id="role" style="width:100%; padding: 10px; margin-bottom:10px; border: 1px solid #ccc; border-radius: 5px;" onchange="document.getElementById('docCode').style.display=(this.value=='Doctor'?'block':'none')">
                <option value="Patient">Patient</option>
                <option value="Doctor">Doctor</option>
            </select>

            <input type="password" id="docCode" placeholder="Access Code" style="display:none; width:100%; padding: 10px; margin-bottom:10px; border: 1px solid #ccc; border-radius: 5px;">

            <select id="hospSelect" style="width:100%; padding: 10px; margin-bottom:15px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="Mulago">Mulago</option>
                <option value="Nakasero">Nakasero</option>
                <option value="Mukono">Mukono</option>
            </select>

            <button onclick="login()" style="width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold;">Enter Clinic</button>
        </div>
    </div>

    <div id="chat-container" style="display: none; height: 100vh; flex-direction: column;">
        <div class="chat-header" style="background: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <span>🟢 Live Session</span>
            <button onclick="logout()" style="background:#dc3545; color: white; border: none; padding:5px 10px; border-radius: 5px;">LEAVE</button>
        </div>

        <div id="messages" style="flex: 1; overflow-y: auto; padding: 15px; background: #fff;"></div>

        <div class="input-area" style="display: flex; flex-direction: column; background: #f8f9fa; border-top: 1px solid #ccc; position: relative; padding: 10px;">
            
            <div id="timer-display" style="display: none; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: rgba(220, 53, 69, 0.9); color: white; padding: 2px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; z-index: 100;">0:00</div>

            <div id="upload-container" style="display: none; width: 100%; padding: 8px; background: #f1f1f1; border-radius: 5px; margin-bottom: 5px;">
                <div style="background: #ccc; border-radius: 5px; height: 8px; width: 100%; overflow: hidden;">
                    <div id="upload-bar" style="background: #28a745; width: 0%; height: 100%; transition: width 0.3s;"></div>
                </div>
                <small id="upload-text" style="font-size: 11px;">Uploading: 0%</small>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <button id="mic-btn" style="background: #dc3545; width: 42px; height: 42px; border-radius: 50%; color: white; border: none; cursor: pointer; touch-action: none;">🎤</button>
                <input type="text" id="m-input" placeholder="Message..." style="flex: 1; height: 38px; border-radius: 20px; border: 1px solid #ccc; padding: 0 15px;" onkeypress="if(event.key==='Enter')send()">
                <button onclick="document.getElementById('fIn').click()" style="background:#6c757d; border-radius: 50%; width: 35px; height: 35px; color: white; border: none; cursor: pointer;">📎</button>
                <button onclick="send()" style="background: #28a745; color: white; border-radius: 5px; height: 38px; border: none; padding: 0 15px; font-weight: bold; cursor: pointer;">Send</button>
            </div>
        </div>
    </div>

    <input type="file" id="fIn" style="display:none" onchange="uploadFile()">
</body>
<script>
        let socket = io(), myUser = "", myRoom = "";
        let mediaRecorder, audioChunks = [], timerInterval, seconds = 0;

        // 1. PRIVATE CONSULTATION LOGIC
       // 1. UPDATED: Request with GPS Location
async function testConsultation() {
    const u = document.getElementById('username').value;
    const h = document.getElementById('hospSelect').value;

    if (!u) return alert("Please enter your Full Name first");

    // Get Location (to help prioritize Mukono/Wakiso hospitals)
    navigator.geolocation.getCurrentPosition((pos) => {
        myUser = u;
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        console.log(`Requesting consultation at ${h} with GPS...`);
        
        socket.emit('request_consultation', {
            user: u,
            hospital_id: h,
            lat: lat,
            lon: lon
        });
    }, (err) => {
        alert("Please enable Location to find the nearest hospital.");
    });
}

// 2. UPDATED: Wait for Payment before showing Chat
socket.on('payment_prompt', (data) => {
    const phone = prompt(`🏥 Hospital: ${data.hospital}\n💰 Fee: UGX ${data.fee}\n\nEnter MTN/Airtel number for Mobile Money:`);
    
    if (phone) {
        alert("Check your phone for the PIN prompt. System is verifying...");
        // This tells Python to simulate a successful payment for testing
        socket.emit('test_payment_success', { session_id: data.session_id });
    }
});

// 3. UPDATED: Only join after Payment is Successful
// --- DOCTOR LOGIC ---

function enterClinic() {
    const docName = document.getElementById('username').value;
    const hosp = document.getElementById('hospSelect').value;
    
    if (!docName) return alert("Please enter your name first");

    myUser = docName; // Save the doctor's name globally
    
    // 1. Join the "Lounge" (The Green Button path)
    socket.emit('join_lounge', { doctor: docName, hospital: hosp });
    
    // 2. Switch UI
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('doctor-dashboard').style.display = 'block';
}

socket.on('new_patient_waiting', (data) => {
    const list = document.getElementById('waiting-list');
    // We use a template literal to build the "Accept" box
    const patientRow = `
        <div id="row-${data.session_id}" style="border: 1px solid #28a745; padding: 10px; margin-bottom: 5px; border-radius: 5px;">
            <p><strong>Patient:</strong> ${data.patient_name}</p>
            <button onclick="acceptPatient('${data.session_id}')" style="background:#28a745; color:white; border:none; padding:5px; cursor:pointer;">
                Accept & Start Chat
            </button>
        </div>
    `;
    list.innerHTML = patientRow + list.innerHTML; // Put new patients at the top
});

function acceptPatient(sid) {
    myRoom = sid; // Set the room to the unique session ID
    
    // 3. Move doctor into the private chat room
    // FIXED: Added 'user: myUser' so the backend knows who is joining
    socket.emit('join', { hospital: sid, user: myUser, role: 'Doctor' });
    
    document.getElementById('doctor-dashboard').style.display = 'none';
    document.getElementById('chat-container').style.display = 'flex';
}

// --- PATIENT LOGIC ---

socket.on('match_found', (data) => {
    myRoom = data.session_id;
    localStorage.setItem('n', myUser);
    localStorage.setItem('r', myRoom);

    // Only NOW do we hide the login screen for the patient
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('chat-container').style.display = 'flex';

    // 4. Move patient into the private chat room
    socket.emit('join', { hospital: myRoom, user: myUser, role: 'Patient' });
    alert("✅ Payment Verified! Room ID: " + data.session_id);
});
        // 2. JOIN & LOGOUT LOGIC
        async function join() {
            const u = document.getElementById('username').value;
            const r = document.getElementById('rid').value;
            if(!u || !r) return alert("Required fields missing");
            
            myUser = u; myRoom = r;
            localStorage.setItem('n', u); localStorage.setItem('r', r);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            socket.emit('join', { user: u, hospital: r });
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear(); 
            window.location.reload();
        }

        // 3. MESSAGING & UPLOADS
        function send() {
            const i = document.getElementById('m-input');
            if(i.value.trim()){
                socket.emit('send_message', { message: i.value, user: myUser, hospital: myRoom, doctor_name: "Dr. Mulinda" });
                i.value = "";
            }
        }

        socket.on('receive_message', (data) => {
            renderMsg(data);
            let chat = JSON.parse(sessionStorage.getItem('session_chat') || "[]");
            chat.push(data);
            sessionStorage.setItem('session_chat', JSON.stringify(chat));
        });

        function renderMsg(data) {
            const container = document.getElementById('messages');
            const d = document.createElement('div');
            d.className = `msg ${data.user === myUser ? 'my' : 'other'}`;
            d.innerHTML = `<strong>${data.user}</strong><br>${data.message}`;
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        }

        // 4. VOICE & FILE FUNCTIONS (Untouched & Stable)
        async function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                return alert("🚨 HTTPS Required for Microphone");
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (seconds >= 1) sendVoiceNote(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                seconds = 0;
                document.getElementById('timer-display').style.display = "block";
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60), s = seconds % 60;
                    document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }, 1000);
            } catch (err) { alert("Mic Error: " + err.message); }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                document.getElementById('timer-display').style.display = "none";
            }
        }

        async function sendVoiceNote(blob) {
            const formData = new FormData();
            formData.append('file', blob, `voice_${Date.now()}.webm`);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const result = await res.json();
            if (result.success) {
                const audioHTML = `<audio controls src="${result.url}" style="width: 200px; height: 35px;"></audio>`;
                socket.emit('send_message', { message: audioHTML, user: myUser, hospital: myRoom });
            }
        }

        function uploadFile() {
            const file = document.getElementById('fIn').files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            document.getElementById('upload-container').style.display = 'block';
            const xhr = new XMLHttpRequest();
            xhr.upload.onprogress = (e) => {
                const percent = Math.round((e.loaded / e.total) * 100);
                document.getElementById('upload-bar').style.width = percent + '%';
                document.getElementById('upload-text').innerText = "Uploading: " + percent + "%";
            };
            xhr.onload = () => {
                const response = JSON.parse(xhr.responseText);
                document.getElementById('upload-container').style.display = 'none';
                if (response.success) {
                    let content = file.type.startsWith('image/') ? `<img src="${response.url}" style="max-width:250px;">` : `<a href="${response.url}" target="_blank">View File</a>`;
                    socket.emit('send_message', { message: content, user: myUser, hospital: myRoom });
                }
            };
            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        // Connect Mic Button to Functions
        const mBtn = document.getElementById('mic-btn');
        if(mBtn) {
            mBtn.addEventListener('mousedown', startRecording);
            mBtn.addEventListener('mouseup', stopRecording);
            mBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
            mBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
        }
    </script>
</body>
</html>
