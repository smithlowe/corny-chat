<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .bubble { padding: 8px 12px; border-radius: 12px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me .bubble { background: #dcf8c6; }
        .input-area { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="chat"></div>

<div class="input-area">
    <input type="text" id="msg-in" placeholder="Type a message...">
    <button onclick="send()">Send</button>
</div>

<script>
    const socket = io();
    // This connects the Flask 'username' to the JavaScript 'myN'
    const myN = "{{ username }}"; 

    function send() {
        const input = document.getElementById('msg-in');
        if(input.value) {
            socket.emit('message', { username: myN, message: input.value });
            input.value = '';
        }
    }

    socket.on('message', d => {
        const isMe = d.username === myN;
        const pic = d.profile_pic || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.username}`;
        
        let content = `<span>${d.message}</span>`;
        if(d.audio) content = `<audio controls src="${d.audio}"></audio>`;

        const html = `
            <div class="msg ${isMe ? 'me' : ''}">
                <img src="${pic}" class="pfp">
                <div class="bubble">
                    ${!isMe ? `<small style="font-weight:bold; color:#075e54;">${d.username}</small><br>` : ''}
                    ${content}
                    <div style="text-align:right; font-size:9px; color:#999; margin-top:4px;">${d.time}</div>
                </div>
            </div>`;
            
        document.getElementById('chat').insertAdjacentHTML('beforeend', html);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    });
</script>
</body>
</html>
