<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny Chat 🌽</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fffef0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffd700; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #main-chat { display: none; width: 100%; max-width: 500px; flex-direction: column; }
        #chat-box { width: 100%; height: 480px; border: 1px solid #ddd; margin: 10px 0; overflow-y: auto; background: white; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .my-msg { align-self: flex-end; background: #ffd700; color: #333; border-bottom-right-radius: 2px; }
        .other-msg { align-self: flex-start; background: #f1f1f1; color: #333; border-bottom-left-radius: 2px; }
        .system-msg { align-self: center; background: none; color: #999; font-size: 12px; font-style: italic; text-align: center; width: 100%; }
        .sender { font-size: 11px; font-weight: bold; display: block; margin-bottom: 2px; opacity: 0.7; }
        .controls { display: flex; gap: 8px; width: 100%; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 18px; border-radius: 25px; border: none; background: #ffd700; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ffcc00; }
        .logout-btn { background: #ff4444; color: white; padding: 6px 12px; font-size: 11px; border-radius: 6px; cursor: pointer; border: none; }
        #record-btn.recording { background: #ff4444; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Corny Chat 🌽</h1>
        <input type="text" id="username-input" placeholder="Enter your name...">
        <button onclick="joinChat()" style="margin-top:10px;">Join the Field</button>
    </div>

    <div id="main-chat">
        <div style="display:flex; justify-content:space-between; width:100%; align-items: center;">
            <span style="font-weight: bold; color: #666;">Online: <span id="user-count">0</span></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendText()">
            <button onclick="sendText()">Send</button>
            <button id="record-btn">🎤</button>
        </div>
    </div>

    <script>
        // Specific connection settings for Render
        const socket = io({
            transports: ["websocket", "polling"],
            rememberUpgrade: true
        });

        const chatBox = document.getElementById('chat-box');
        const loginScreen = document.getElementById('login-screen');
        const mainChat = document.getElementById('main-chat');
        const recordBtn = document.getElementById('record-btn');
        let myName = localStorage.getItem('corny_name');
        let mediaRecorder;
        let chunks = [];

        // 1. Auto-Login & History
        if (myName) {
            loginScreen.style.display = 'none';
            mainChat.style.display = 'flex';
            if (!sessionStorage.getItem('announced')) {
                socket.emit('user_joined', { name: myName });
                sessionStorage.setItem('announced', 'true');
            }
        }

        const history = localStorage.getItem('chat_history');
        if (history) { chatBox.innerHTML = history; chatBox.scrollTop = chatBox.scrollHeight; }

        function joinChat() {
            const val = document.getElementById('username-input').value.trim();
            if (val) {
                myName = val;
                localStorage.setItem('corny_name', val);
                sessionStorage.setItem('announced', 'true');
                loginScreen.style.display = 'none';
                mainChat.style.display = 'flex';
                socket.emit('user_joined', { name: val });
            }
        }

        function logout() { localStorage.clear(); sessionStorage.clear(); location.reload(); }

        function sendText() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                socket.emit('message', { content: input.value, user: myName });
                input.value = '';
            }
        }

        // 2. Rendering Messages
        socket.on('render_msg', (data) => {
            const div = document.createElement('div');
            if (data.user === 'System') {
                div.className = 'message system-msg';
                div.innerText = data.content;
            } else {
                const isMe = data.user === myName;
                div.className = `message ${isMe ? 'my-msg' : 'other-msg'}`;
                const nameTag = `<span class="sender">${isMe ? 'You' : data.user}</span>`;
                
                if (data.type === 'text') {
                    div.innerHTML = nameTag + data.content;
                } else {
                    div.innerHTML = `${nameTag}<audio src="${data.content}" controls style="width:180px;"></audio>`;
                }
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            localStorage.setItem('chat_history', chatBox.innerHTML);
        });

        socket.on('user_count', (data) => { document.getElementById('user-count').innerText = data.count; });

        // 3. Voice Recording
        recordBtn.onmousedown = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => socket.emit('voice_note', { audio: reader.result, user: myName });
                };
                mediaRecorder.start();
                recordBtn.classList.add('recording');
            } catch (err) { alert("Mic access denied"); }
        };

        recordBtn.onmouseup = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
            }
        };
    </script>
</body>
</html>
