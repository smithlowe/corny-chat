<!DOCTYPE html>

        #timer-display {
            position: absolute;
            top: -45px; /* Sits above the mic */

            transform: translateX(-50%);
            background: #dc3545;
            color: white;
            padding: 5px 10px;

        #chat-container { display: none; flex-direction: column; height: 100vh; background: white; }

        .chat-media-style {
            display: block;
            max-width: 100%; /* Fits perfectly inside the bubble */

<script>
    // 0. SUPABASE INITIALIZATION

                hospital: myRoom,

            });

socket.on('new_patient_waiting', function(data) {
    console.log("🔔 New Patient Arrived:", data.patient_name);

    const noPatientsMsg = document.getElementById('no-patients');
    if (noPatientsMsg) noPatientsMsg.style.display = 'none';

    const list = document.getElementById('waiting-list');
    
    // Check if we already have this patient in the list (prevents duplicates)
    if (document.getElementById(`card-${data.session_id}`)) return;

    item.style = "background: #f8f9fa; border: 1px solid #e0e0e0; padding: 15px; margin-bottom: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease;";
    
    item.innerHTML = `
        <div>
            <span style="font-weight: bold; color: #2c3e50; font-size: 16px;">👤 ${data.patient_name}</span><br>
            <small style="color: #28a745; font-weight: bold;">Status: Waiting for Consult</small>
        </div>
        <button onclick="acceptPatient('${data.session_id}')" 
                style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 4px rgba(40,167,69,0.3);">
            Accept Patient
        </button>
    `;
    list.appendChild(item);
});
// --- MISSING HOSPITAL FETCHER START ---
async function refreshHospitalList() {
    console.log("🔍 Fetching hospitals from Supabase...");
    
    try {
        const { data, error } = await _supabase
            .from('hospitals')
            .select('name, secret_code, consultation_fee');

        if (error) {
            console.error("❌ Supabase Error:", error.message);
            return;
        }

        const select = document.getElementById('hospSelect');
        if (!select) return;

        // Clear the "Loading..." message
        select.innerHTML = '<option value="">-- Select Hospital --</option>';

        data.forEach(hospital => {
            let opt = document.createElement('option');
            opt.value = hospital.secret_code;
            
            // Set attributes so we can use them later for payment and display
            const fee = hospital.consultation_fee || "5,000";
            opt.setAttribute('data-fee', fee);
            opt.setAttribute('data-name', hospital.name);

            // Default text (will be updated by socket counts if doctors are online)
            opt.textContent = `${hospital.name} - ${fee} UGX (Checking...)`;
            select.appendChild(opt);
        });

        console.log("✅ Hospital list loaded.");
        
        // After loading the names, ask the server for the current online doctor counts
        socket.emit('get_doctor_counts');

    } catch (err) {
        console.error("💥 Critical fetch error:", err);
    }
}

// 🚩 CRITICAL: Run this function automatically when the page loads
document.addEventListener('DOMContentLoaded', refreshHospitalList);
// --- MISSING HOSPITAL FETCHER END ---

// 2. The Acceptance Handshake
function acceptPatient(sessionId) {
    console.log("🚀 Accepting patient session:", sessionId);

    // Tell the server this doctor is taking the case
    // Note: myRoom is your Hospital Code (MUL101) and myUser is the Doctor Name
    socket.emit('doctor_accepted_patient', {
        session_id: sessionId,
        hospital: myRoom, 
        doctor_name: myUser
    });

    // Optional: Add a loading state to the button so the doctor doesn't click twice
    const btn = event.target;
    btn.innerText = "Connecting...";
    btn.disabled = true;
    btn.style.background = "#6c757d";
}

// 3. The Final Switch to Chat
socket.on('match_found', function(data) {
    console.log("✅ Match Found! Switching to Chat.");
    
    // Hide the Waiting Room and Login Overlay
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('doctor-dashboard').style.display = 'none';
    
    // Show the Chat Screen
    const chatContainer = document.getElementById('chat-container');
    chatContainer.style.display = 'flex';
    
    // Set the header name
    document.getElementById('chat-with').innerText = data.doctor ? "Doctor: " + data.doctor : "Patient: Online";
});

    socket.on('remove_patient_from_list', function(data) {
    // 1. Remove all instances of this specific patient
    const allInstances = document.querySelectorAll('.req-' + data.session_id);
    allInstances.forEach(el => el.remove());

    // 2. CHECK: Is the list now empty?
    const list = document.getElementById('waiting-list');
    
    // We check if there are any <div> elements left inside the list
    if (list && list.querySelectorAll('div').length === 0) {
        list.innerHTML = `
            <p id="no-patients" style="color: #999; text-align: center; padding: 20px;">
                No patients waiting at the moment...
            </p>`;
    }
});

    // 5. LIVE DOCTOR COUNTS
    socket.on('update_doctor_counts', (data) => {
    console.log("📊 Doctor counts update received:", data);

    // --- 1. UPDATE THE DOCTOR'S DASHBOARD STATUS ---
    const countElement = document.getElementById('online-doctor-count');
    if (countElement && data.count !== undefined) {
        countElement.innerText = data.count + " Doctor(s) Online";
        countElement.style.color = "#2ecc71"; 
    }

    // --- 2. UPDATE THE PATIENT'S HOSPITAL SELECT LIST ---
    const select = document.getElementById('hospSelect');
    if (select && data.hospital_counts) { 
        // Note: Make sure your backend sends 'hospital_counts'
        for (let i = 0; i < select.options.length; i++) {
            let opt = select.options[i];
            let code = opt.value;

            if (code && data.hospital_counts[code] !== undefined) {
                let baseName = opt.getAttribute('data-name') || opt.textContent.split(' (')[0];
                
                if (!opt.getAttribute('data-name')) {
                    opt.setAttribute('data-name', baseName);
                }

                let numOnline = data.hospital_counts[code];
                if (numOnline > 0) {
                    opt.textContent = `${baseName} (${numOnline} Online)`;
                    opt.style.color = "#28a745"; // Green
                } else {
                    opt.textContent = `${baseName} (Offline)`;
                    opt.style.color = "#6c757d"; // Gray
                }
            }
        }
    }
});

    // PATIENT FLOW
    function startPatientFlow() {
        const name = document.getElementById('username').value;
        if (!name) return alert("Please enter your name to proceed.");
        myUser = name;
        testConsultation(); 
    }

    // DOCTOR FLOW
    function startDoctorFlow() {
        const name = document.getElementById('username').value;
        const code = document.getElementById('docCode').value;
        const select = document.getElementById('hospSelect');
        const hospCode = select.value; 
        const hospName = select.options[select.selectedIndex].text;

        if (!name) return alert("Doctor, please enter your name.");
        if (!hospCode) return alert("Please select your hospital first.");
        if (code !== hospCode) {
            return alert(`Invalid Access Code for ${hospName}. Please check your hospital credentials.`);
        }

        myUser = "Dr. " + name;
        socket.emit('join_lounge', { doctor: myUser, hospital: hospCode });
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('doctor-dashboard').style.display = 'block';
    }

// --- FUNCTION 1: THE ACTION ---
function testConsultation() {
    const name = document.getElementById('username').value;
    const select = document.getElementById('hospSelect');
    
    if (!name) return alert("Please enter your name!");
    if (!select.value) return alert("Please select a hospital!");

    const selectedOption = select.options[select.selectedIndex];
    const hospCode = select.value;
    const rawFee = selectedOption.getAttribute('data-fee') || "5,000";
    const cleanFee = rawFee.replace(/[^0-9]/g, '');

    let phone = prompt(`Confirm Payment of ${rawFee} UGX\nEnter MTN/Airtel Number:`);
    if (!phone || !/^\d{10}$/.test(phone)) return alert("❌ Invalid number!");

    const session_id = "cons-" + Math.random().toString(36).substr(2, 9);
    
    myUser = name;
    myRole = 'Patient';
    myRoom = session_id;

    saveSession({ 
        user: myUser, 
        role: myRole, 
        room: myRoom, 
        hospCode: hospCode 
    });

    socket.emit('patient_paid_and_waiting', { 
        patient_name: name, 
        hospital_id: hospCode,
        phone: phone,
        session_id: session_id,
        amount_paid: parseInt(cleanFee),
        status: 'pending'
    });

    socket.emit('join', { room: myRoom, user: myUser, role: 'Patient' });

    document.getElementById('login-overlay').style.display = 'none';
    
    // CALL the second function here
    showWaitingScreen(name, selectedOption.text.split(' -')[0]);
} // <--- Only ONE brace here to close the function

}
// 💾 Save session to browser memory
function saveSession(data) {
    localStorage.setItem('corny_session', JSON.stringify(data));
}

// 🔄 Auto-login if a session exists
function checkExistingSession() {
    const saved = localStorage.getItem('corny_session');
    if (saved) {
        const data = JSON.parse(saved);
        myUser = data.user;
        myRole = data.role;
        myRoom = data.room;
        const hospCode = data.hospCode;

        // Re-join the correct room automatically
        socket.emit('join', { hospital: myRoom || `lounge_${hospCode}`, user: myUser, role: myRole });

        // UI: Hide login, show correct screen
        document.getElementById('login-overlay').style.display = 'none';
        if (myRole === 'Doctor') {
            document.getElementById('doctor-dashboard').style.display = 'block';
        } else {
            document.getElementById('chat-container').style.display = 'flex';
        }
    }
}

        session_id: sessionId,
        hospital: myRoom, // This is your hospital code (e.g., 'MUL101')
        doctor_name: myUser // Your name (e.g., 'Dr. Lawrence')
    });

    // 2. Provide instant UI feedback
    const row = document.querySelector(`.req-${sessionId}`);
    if (row) {
        const btn = row.querySelector('button');
        if (btn) {
            btn.innerText = "Connecting...";
            btn.disabled = true;
            btn.style.background = "#6c757d";
        }
    }
}

    function logout() {
        localStorage.clear();
        sessionStorage.clear(); 
        window.location.reload();
    }

    function send() {
        const i = document.getElementById('m-input');
        if (i.value.trim() && myRoom) {
            socket.emit('send_message', { 
                message: i.value, 
                user: myUser, 
                hospital: myRoom,
                doctor_name: myUser.startsWith('Dr.') ? myUser : "" 
            });
            i.value = "";
        }
    }

    socket.on('receive_message', (data) => {
        console.log("📩 RECEIVER GOT:", data); 
        const container = document.getElementById('messages');
        const d = document.createElement('div');
        const senderName = data.user || data.sender || "Unknown";
        const isMe = (senderName === myUser);
        d.className = `msg ${isMe ? 'my' : 'other'}`;

        let content = "";
        if (data.media_url) {
            if (data.media_type === 'image') {
                content = `<img src="${data.media_url}" class="chat-media-style" style="max-width:250px;">`;
            } else if (data.media_type === 'audio') {
                content = `<audio controls src="${data.media_url}"></audio>`;
            }
        } 
        else if (data.message && data.message.includes('<audio')) {
            content = data.message; 
        }
        else {
            content = `<p>${data.message || ""}</p>`;
        }

        d.innerHTML = `<strong>${senderName}:</strong><br>${content}`;
        container.appendChild(d);
        container.scrollTop = container.scrollHeight;
    });

    async function startRecording() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            return alert("🚨 HTTPS Required for Microphone");
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                if (seconds >= 1) sendVoiceNote(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            seconds = 0;
            document.getElementById('timer-display').style.display = "block";
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60), s = seconds % 60;
                document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);
        } catch (err) { alert("Mic Error: " + err.message); }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            document.getElementById('timer-display').style.display = "none";
        }
    }

    async function sendVoiceNote(blob) {
        const formData = new FormData();
        formData.append('file', blob, `voice_${Date.now()}.webm`);
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const result = await res.json();
        if (result.success) {
            const audioHTML = `<audio controls src="${result.url}" style="width: 200px; height: 35px;"></audio>`;
            socket.emit('send_message', { message: audioHTML, user: myUser, hospital: myRoom });
        }
    }

    function uploadFile() {
        const file = document.getElementById('fIn').files[0];
        if (!file) return;
        
        const formData = new FormData();
        formData.append('file', file);
        document.getElementById('upload-container').style.display = 'block';
        
        const xhr = new XMLHttpRequest();
        
        xhr.upload.onprogress = (e) => {
            const percent = Math.round((e.loaded / e.total) * 100);
            document.getElementById('upload-bar').style.width = percent + '%';
            document.getElementById('upload-text').innerText = "Uploading: " + percent + "%";
        };

        xhr.onload = () => {
            try {
                const response = JSON.parse(xhr.responseText);
                document.getElementById('upload-container').style.display = 'none';

                if (response.success && response.url) {
                    console.log("📤 Upload Success! Link:", response.url);
                    let fileCategory = 'image'; 
                    if (file.type.startsWith('video/')) fileCategory = 'video';
                    if (file.type.startsWith('audio/')) fileCategory = 'audio';

                    socket.emit('send_message', { 
                        hospital: myRoom, 
                        user: myUser, 
                        message: "", 
                        media_url: response.url, 
                        media_type: fileCategory 
                    });
                } else {
                    console.error("❌ Upload failed or no URL in response:", response);
                }
            } catch (e) {
                console.error("❌ Error parsing upload response:", e);
            }
        };
        xhr.open('POST', '/upload');
        xhr.send(formData);
    }

    const mBtn = document.getElementById('mic-btn');
    if(mBtn) {
        mBtn.addEventListener('mousedown', startRecording);
        mBtn.addEventListener('mouseup', stopRecording);
        mBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        mBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
    }
</script>
</body>
</html>
