<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app-container { background: white; width: 90%; max-width: 400px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; text-align: center; }
        #chat-container { display: none; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; text-align: left; margin-bottom: 10px; border-radius: 8px; background: #fafafa; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #0084ff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .logout-btn { background-color: #ff4b4b; margin-top: 10px; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="join-container">
        <h1>🌍 Global Social</h1>
        <input type="text" id="nickname-input" placeholder="Enter your nickname...">
        <button onclick="joinWorld()">Join World</button>
    </div>

    <div id="chat-container">
        <h3 id="welcome-msg">Chatting as: </h3>
        <div id="messages"></div>
        <input type="text" id="message-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
        <br>
        <button class="logout-btn" onclick="logout()">Exit / Change Name</button>
    </div>
</div>

<script>
    const socket = io();
    let currentUser = "";

    // 1. On page load, check if the user is already "Logged In"
    document.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('chat_nickname');
        if (savedName) {
            autoJoin(savedName);
        }
    });

    function autoJoin(name) {
        currentUser = name;
        showChat(name);
        socket.emit('join', {username: name});
    }

    function joinWorld() {
        const name = document.getElementById('nickname-input').value;
        if (name) {
            localStorage.setItem('chat_nickname', name); // 2. SAVE to browser notebook
            autoJoin(name);
        }
    }

    function showChat(name) {
        document.getElementById('join-container').style.display = 'none';
        document.getElementById('chat-container').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Chatting as: " + name;
    }

    function sendMessage() {
        const msgInput = document.getElementById('message-input');
        if (msgInput.value) {
            socket.emit('message', {username: currentUser, message: msgInput.value});
            msgInput.value = '';
        }
    }

    function logout() {
        localStorage.removeItem('chat_nickname'); // 3. WIPE the notebook
        location.reload(); // Refresh to show join screen
    }

    socket.on('message', function(data) {
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<p><strong>${data.username}:</strong> ${data.message}</p>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    });
</script>

</body>
</html>
