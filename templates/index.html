<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny-Comm Medical Portal</title>
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        #chat-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; flex-direction: column; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .btn-red { background: #dc3545; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; word-wrap: break-word; font-size: 15px; }
        .my { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
        .chat-header { background: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; background: white; }
    </style>
</head>
<body>
    <div id="login-overlay" style="background: white; position: fixed; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div style="border: 1px solid #ccc; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">
        <h2 style="color: #007bff;">🏥 Corny-Comm Portal</h2>
        <p>Please enter your details to join the consultation.</p>
        
        <input type="text" id="username" placeholder="Your Name" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <input type="text" id="room_id" placeholder="Consultation ID (e.g. ROOM-101)" style="width: 100%; padding: 10px; margin-bottom: 20px;">
        
        <button onclick="login()" style="width: 100%; background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
            Enter Consultation
        </button>
    </div>
</div>

    <div id="login-container">
        <h2 style="color: #007bff; margin-top: 0;">🏥 Corny-Comm</h2>
        <input type="text" id="username" placeholder="Your Full Name">
        <select id="role" onchange="document.getElementById('accessCode').style.display=(this.value=='Doctor'?'block':'none')">
            <option value="Patient">I am a Patient</option>
            <option value="Doctor">I am a Doctor</option>
        </select>
        <input type="password" id="accessCode" placeholder="Doctor Access Code" style="display:none;">
        <select id="hospital">
            <option value="Mulago">Mulago Hospital</option>
            <option value="Nakasero">Nakasero Hospital</option>
            <option value="Mukono">Mukono Clinic</option>
        </select>
        <button onclick="join()">JOIN LOBBY</button>
        <input type="file" id="fileInput" name="file" style="display: none;" onchange="uploadMedicalFile()">

</button>
    </div>

    <div id="chat-container">
        <div class="chat-header">
            <span id="chat-status">🏥 Medical Room</span>
            <button onclick="logout()" class="btn-red" style="width:auto; margin:0;">LEAVE</button>
        </div>
        <div id="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="m-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="width:auto; margin:0;">Send</button>
            <button type="button" onclick="document.getElementById('fileInput').click()" style="font-size: 20px; cursor: pointer;">
    📎
        </div>
    </div>

    <script>
        // FIX: Force WebSocket transport for Render compatibility
        const socket = io({
            transports: ["websocket"],
            upgrade: false
        });

        // Check for existing session
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('n')) {
                showChatUI();
                rejoinRoom();
            }
        });

        function showChatUI() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
        }

        function rejoinRoom() {
            socket.emit('join', { 
                name: localStorage.getItem('n'), 
                hospital: localStorage.getItem('h'), 
                role: localStorage.getItem('r') 
            });
        }

        async function join() {
            const user = document.getElementById('username').value.trim();
            const role = document.getElementById('role').value;
            const hosp = document.getElementById('hospital').value;
            const code = document.getElementById('accessCode').value;

            if (!user) return alert("Please enter your name");

            if (role === 'Doctor') {
                const res = await fetch('/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hospital: hosp, code: code, name: user })
                });
                const data = await res.json();
                if (!data.success) return alert("Invalid Code!");
            }

            localStorage.setItem('n', user);
            localStorage.setItem('h', hosp);
            localStorage.setItem('r', role);

            showChatUI();
            rejoinRoom();
        }

       function send() {
    const input = document.getElementById('m-input');
    if (!input.value) return;

    socket.emit('send_message', {
        user: localStorage.getItem('n'), // Your saved name
        message: input.value,
        room_id: myRoom // This must match the 'room_id' in app.py
    });
    
    input.value = "";
}
        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // LISTENERS
        socket.on('receive_message', (data) => {
            const msgDiv = document.getElementById('messages');
            const div = document.createElement('div');
            const isMe = data.user === localStorage.getItem('n');
            div.className = isMe ? 'msg my' : 'msg other';
            div.innerHTML = `<strong>${data.user}</strong><br>${data.message}`;
            msgDiv.appendChild(div);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
       function uploadMedicalFile() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    if (!file) return;

    // Show a small "Uploading..." message if you want
    console.log("Uploading: " + file.name);

    const formData = new FormData();
    formData.append('file', file);

    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
     if (data.success) {
            // 🚀 Broadcast to the room
            socket.emit('send_message', {
                user: localStorage.getItem('n'), 
                message: `📎 <a href="${data.url}" target="_blank" style="color: #007bff; text-decoration: underline;">View File: ${file.name}</a>`,
                room_id: myRoom 
            });
            
            fileInput.value = ''; 
            console.log("✅ File link broadcasted to room:", myRoom);
        } else {
            alert("Upload failed: " + data.error);
        }
    }) // This closes the .then(data => {
    .catch(err => {
        console.error("❌ Network Error:", err);
    });
} // This closes the whole uploadMedicalFile() function
        socket.on('status', (data) => {
            const msgDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.style.cssText = "text-align:center; font-size:11px; color:#888; margin:5px;";
            div.textContent = data.msg;
            msgDiv.appendChild(div);
        });
        let myUsername = "";
let myRoom = "";


    myUsername = document.getElementById('username').value;
    myRoom = document.getElementById('room_id').value;

   function login() {
    const nameInput = document.getElementById('username').value;
    const roomInput = document.getElementById('room_id').value;

    if (nameInput && roomInput) {
        myUsername = nameInput;
        myRoom = roomInput;

        // Save it so the message listener can "see" who we are
        localStorage.setItem('n', myUsername); 

        socket.emit('join', { user: myUsername, room: myRoom });
        document.getElementById('login-overlay').style.display = 'none';
    }
}

function sendMessage() {
    const message = document.getElementById('messageInput').value;
    if (message.trim() !== "") {
        // 3. Send the message ONLY to people in 'myRoom'
        socket.emit('send_message', {
            user: myUsername,
            message: message,
            room: myRoom  // This matches the 'room' variable in app.py
        });
        document.getElementById('messageInput').value = "";
    }
}
    </script>
</body>
</html>
