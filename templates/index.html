<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Global Social</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #e5ddd5; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 500px; height: 100%; background: #fff; display: flex; flex-direction: column; position: relative; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; background: #fdfdfd; }
        
        /* Message Styling */
        .msg-row { margin-bottom: 15px; display: flex; align-items: flex-end; gap: 10px; }
        .is-me { flex-direction: row-reverse; }
        .pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        .bubble { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .mine { background: #dcf8c6; border-bottom-right-radius: 2px; }
        .theirs { background: #fff; border-bottom-left-radius: 2px; }
        .user-label { font-size: 11px; font-weight: bold; color: #075e54; margin-bottom: 4px; display: block; }
        
        /* Mobile Input Bar */
        .input-bar { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; align-items: center; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #msg-in { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: #075e54; color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Login Screen */
        #login { position: fixed; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .pfp-preview { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #075e54; margin-bottom: 20px; cursor: pointer; object-fit: cover; }
        
        /* Vibes */
        body.sunset #app { background: #fff5e1; }
        body.sunset header { background: #ff7e5f; }
    </style>
</head>
<body class="default">
<div id="app">
    <div id="login">
        <h2 style="color:#075e54">Global Social</h2>
        <img id="preview-img" class="pfp-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=Bot" onclick="document.getElementById('file-in').click()">
        <input type="file" id="file-in" accept="image/*" style="display:none" onchange="loadImg(this)">
        <p style="font-size: 12px; color: #666;">Tap the robot to choose a photo</p>
        <input type="text" id="user-in" placeholder="Enter Name..." style="width: 250px; padding: 15px; border-radius: 25px; border: 1px solid #ddd; text-align: center; margin-bottom: 20px;">
        <button onclick="join()" class="circle-btn" style="width: 200px; border-radius: 25px;">Start Chatting</button>
    </div>

    <header>
        <div><strong>Chat Room</strong></div>
        <select onchange="socket.emit('vibe_change', {vibe: this.value})">
            <option value="default">Classic</option>
            <option value="sunset">Sunset</option>
        </select>
    </header>

    <div id="chat"></div>

    <div class="input-bar">
        <input type="text" id="msg-in" placeholder="Type..." onkeypress="if(event.key==='Enter')send()">
        <button id="mic" class="circle-btn" onclick="toggleMic()">🎙️</button>
        <button class="circle-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    const socket = io();
    let myName = localStorage.getItem('chat_name') || "";
    let myPfp = localStorage.getItem('chat_pfp') || "";
    let recorder, chunks = [];

    if (myName) document.getElementById('login').style.display = 'none';

    function loadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview-img').src = e.target.result;
                myPfp = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function join() {
        const n = document.getElementById('user-in').value.trim();
        if (n) {
            myName = n;
            localStorage.setItem('chat_name', n);
            localStorage.setItem('chat_pfp', myPfp);
            document.getElementById('login').style.display = 'none';
        }
    }

    function send() {
        const i = document.getElementById('msg-in');
        if (i.value.trim()) {
            socket.emit('message', {username: myName, message: i.value, profile_pic: myPfp, is_audio: false});
            i.value = '';
        }
    }

    async function toggleMic() {
        const btn = document.getElementById('mic');
        if (!recorder || recorder.state === "inactive") {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(s);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(chunks));
                reader.onloadend = () => socket.emit('message', {username: myName, message: reader.result, profile_pic: myPfp, is_audio: true});
            };
            recorder.start();
            btn.style.background = "red";
        } else {
            recorder.stop();
            btn.style.background = "#075e54";
        }
    }

    socket.on('message', d => {
        const win = document.getElementById('chat');
        const isMe = d.username === myName;
        const img = d.profile_pic || `https://api.dicebear.com/7.x/bottts/svg?seed=${d.username}`;
        win.innerHTML += `
            <div class="msg-row ${isMe ? 'is-me' : ''}">
                <img src="${img}" class="pfp">
                <div class="bubble ${isMe ? 'mine' : 'theirs'}">
                    ${!isMe ? `<span class="user-label">${d.username}</span>` : ''}
                    ${d.is_audio ? `<audio controls src="${d.message}"></audio>` : d.message}
                </div>
            </div>`;
        win.scrollTop = win.scrollHeight;
    });

    socket.on('vibe_update', d => document.body.className = d.vibe);
    socket.on('reload', () => location.reload());
</script>
</body>
</html>
