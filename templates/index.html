<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corny Chat Pro 🌽</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fffef0; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffd700; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #main-chat { display: none; width: 100%; max-width: 500px; flex-direction: column; height: 92vh; }
        #chat-box { flex: 1; border: 1px solid #ddd; margin: 10px 0; overflow-y: auto; background: white; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .my-msg { align-self: flex-end; background: #ffd700; color: #222; border-bottom-right-radius: 2px; }
        .other-msg { align-self: flex-start; background: #f1f1f1; color: #333; border-bottom-left-radius: 2px; }
        .system-msg { align-self: center; background: none; color: #aaa; font-size: 11px; font-style: italic; box-shadow: none; margin: 5px 0; }
        .sender-name { font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; opacity: 0.7; }
        .timestamp { font-size: 9px; margin-top: 5px; display: block; text-align: right; opacity: 0.5; }
        #typing-status { height: 20px; font-size: 12px; color: #888; font-style: italic; padding-left: 10px; }
        .emoji-bar { display: flex; gap: 12px; margin: 5px 0; padding-left: 5px; font-size: 22px; cursor: pointer; }
        .controls { display: flex; gap: 8px; width: 100%; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 15px; border-radius: 25px; border: none; background: #ffd700; font-weight: bold; cursor: pointer; }
        #record-btn.recording { background: #ff4444 !important; color: white !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        audio { width: 180px; height: 35px; margin-top: 5px; }
        .logout-btn { background: #ff4444; color: white; padding: 6px 12px; font-size: 11px; border-radius: 8px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="login-screen">
    <h1>Corny-Comm Medical 🏥</h1>
    <input type="text" id="username-input" placeholder="Your Full Name...">
    
    <select id="role-input" style="margin-top:10px; padding:10px; border-radius:25px; width:220px;">
        <option value="Patient">I am a Patient</option>
        <option value="Doctor">I am a Doctor/Medic</option>
    </select>

    <button onclick="joinChat()" style="margin-top:15px; width: 220px;">Start Consultation</button>
</div>

    <div id="main-chat">
        <div style="display:flex; justify-content:space-between; width:100%; align-items: center;">
            <span style="color: #666; font-weight: bold;">🌽 Online: <span id="user-count">0</span></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div id="chat-box"></div>
        <div id="typing-status"></div>
        <div class="emoji-bar">
            <span onclick="addEmoji('🌽')">🌽</span><span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('😂')">😂</span><span onclick="addEmoji('🔥')">🔥</span>
        </div>
        <div class="controls">
            <input type="text" id="msg-input" placeholder="Message..." oninput="broadcastTyping()" onkeypress="if(event.key==='Enter')sendText()">
            <button onclick="sendText()">Send</button>
            <button id="record-btn">🎤</button>
        </div>
    </div>

    <script>
        const socket = io({ transports: ["websocket", "polling"] });
        const chatBox = document.getElementById('chat-box');
        const loginScreen = document.getElementById('login-screen');
        const mainChat = document.getElementById('main-chat');
        const typingStatus = document.getElementById('typing-status');
        const recordBtn = document.getElementById('record-btn');
        let myName = localStorage.getItem('corny_name');
        let typeTimer, mediaRecorder, chunks = [];

        window.onload = () => {
            const savedHistory = localStorage.getItem('chat_history');
            if (savedHistory) {
                chatBox.innerHTML = savedHistory;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
            if (myName) {
                loginScreen.style.display = 'none';
                mainChat.style.display = 'flex';
                
                // Silent resync if already announced, otherwise join fresh
                if (sessionStorage.getItem('announced_presence')) {
                    socket.emit('resync_user', { name: myName });
                } else {
                    socket.emit('user_joined', { name: myName });
                    sessionStorage.setItem('announced_presence', 'true');
                }
            }
        };

        socket.on('user_count', (data) => {
            document.getElementById('user-count').innerText = data.count;
        });

        function addEmoji(emoji) { document.getElementById('msg-input').value += emoji; document.getElementById('msg-input').focus(); }

        function broadcastTyping() {
            socket.emit('typing', { user: myName, isTyping: true });
            clearTimeout(typeTimer);
            typeTimer = setTimeout(() => socket.emit('typing', { user: myName, isTyping: false }), 2000);
        }

        socket.on('display_typing', (data) => {
            typingStatus.innerText = data.isTyping ? `${data.user} is typing...` : "";
        });

        function sendText() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                socket.emit('message', { content: input.value, user: myName, time: timeStr });
                input.value = '';
                socket.emit('typing', { user: myName, isTyping: false });
            }
        }

        socket.on('render_msg', (data) => {
            const div = document.createElement('div');
            if (data.user === 'System') {
                div.className = 'message system-msg';
                div.innerText = data.content;
            } else {
                const isMe = data.user === myName;
                div.className = `message ${isMe ? 'my-msg' : 'other-msg'}`;
                const nameTag = `<span class="sender-name">${isMe ? 'You' : data.user}</span>`;
                if (data.type === 'text') {
                    div.innerHTML = `${nameTag}<div>${data.content}</div><span class="timestamp">${data.time}</span>`;
                } else {
                    div.innerHTML = `${nameTag}<audio src="${data.content}" controls></audio><span class="timestamp">${data.time}</span>`;
                }
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            localStorage.setItem('chat_history', chatBox.innerHTML);
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        socket.emit('voice_note', { audio: reader.result, user: myName, time: timeStr });
                    };
                };
                mediaRecorder.start();
                recordBtn.classList.add('recording');
            } catch (err) { alert("Mic blocked!"); }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") { mediaRecorder.stop(); }
            recordBtn.classList.remove('recording');
        }

        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        recordBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

function joinChat() {
    const nameVal = document.getElementById('username-input').value.trim();
    const roleVal = document.getElementById('role-input').value;

    if (nameVal) {
        myName = nameVal;
        myRole = roleVal; // Store this globally
        
        localStorage.setItem('corny_name', nameVal);
        localStorage.setItem('corny_role', roleVal);
        
        loginScreen.style.display = 'none';
        mainChat.style.display = 'flex';
        
        // Tell the server who we are and what we do
        socket.emit('user_joined', { name: nameVal, role: roleVal });
    }
}
        function logout() { 
            localStorage.clear(); 
            sessionStorage.clear();
            location.reload(); 
        }
    </script>
</body>
</html>
